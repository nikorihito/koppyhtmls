<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ニコリタイピング</title>

  <style>
    :root {
      --bg: #e8fbff;
      --bg2: #b6f2ff;
      --blue: #00a8d8;
      --blue2: #23c7ec;
      --aqua: #58e6f2;
      --yellow: #ffe06e;
      --navy: #06354f;
      --muted: #52788a;
      --line: rgba(0, 118, 165, .18);
      --shadow: 0 22px 60px rgba(0, 100, 145, .18);
      --danger: #ff5d73;
      --good: #16a66f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--navy);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 224, 110, .35), transparent 20%),
        radial-gradient(circle at 82% 12%, rgba(255,255,255,.85), transparent 18%),
        linear-gradient(180deg, #f7feff 0%, var(--bg) 35%, var(--bg2) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 2px, transparent 2.7px),
        radial-gradient(circle, rgba(0,168,216,.24) 0 3px, transparent 3.8px),
        linear-gradient(135deg, transparent 0 45%, rgba(255,255,255,.22) 46% 54%, transparent 55%);
      background-size: 120px 120px, 180px 180px, 280px 280px;
      background-position: 0 0, 52px 76px, 0 0;
      animation: bubbles 26s linear infinite;
      opacity: .58;
    }

    body::after {
      content: "";
      position: fixed;
      left: -10%;
      right: -10%;
      bottom: -96px;
      height: 245px;
      z-index: 0;
      pointer-events: none;
      opacity: .9;
      background:
        radial-gradient(130px 58px at 8% 22%, rgba(255,255,255,.54) 0 62%, transparent 64%),
        radial-gradient(150px 64px at 28% 18%, rgba(255,255,255,.38) 0 62%, transparent 64%),
        radial-gradient(160px 68px at 50% 22%, rgba(255,255,255,.48) 0 62%, transparent 64%),
        radial-gradient(150px 64px at 72% 18%, rgba(255,255,255,.38) 0 62%, transparent 64%),
        radial-gradient(170px 72px at 92% 22%, rgba(255,255,255,.50) 0 62%, transparent 64%),
        linear-gradient(180deg, rgba(0,168,216,.08), rgba(0,168,216,.24));
      animation: wave 8s ease-in-out infinite alternate;
    }

    @keyframes bubbles {
      from { transform: translateY(0); }
      to { transform: translateY(120px); }
    }

    @keyframes wave {
      from { transform: translateX(-18px) translateY(0); }
      to { transform: translateX(18px) translateY(-8px); }
    }

    ruby {
      ruby-align: center;
    }

    rt {
      color: #52788a;
      font-size: .48em;
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1;
    }

    .jp-word rt {
      font-size: .32em;
      color: #2f748e;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .app::after {
      content: "";
      position: fixed;
      right: 22px;
      bottom: 20px;
      width: min(160px, 26vw);
      height: min(160px, 26vw);
      background: url("./ニコリヒト.png") center / contain no-repeat;
      opacity: .13;
      filter: drop-shadow(0 18px 28px rgba(0, 85, 130, .28));
      pointer-events: none;
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 60px);
      letter-spacing: .06em;
      line-height: 1.1;
    }

    h1::after {
      content: "";
      display: block;
      width: 128px;
      height: 7px;
      margin-top: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--aqua), var(--yellow));
    }

    .lead {
      margin: 12px 0 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.7;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .account-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.64);
      color: var(--navy);
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(0, 100, 145, .08);
    }

    button,
    .button-link {
      border: 0;
      border-radius: 999px;
      padding: 12px 17px;
      color: var(--navy);
      background: linear-gradient(135deg, var(--blue2) 0%, var(--aqua) 54%, var(--yellow) 100%);
      font-family: inherit;
      font-weight: 1000;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 13px 26px rgba(0, 122, 170, .20);
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }

    button:hover,
    .button-link:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 18px 34px rgba(0, 122, 170, .24);
    }

    button.secondary,
    .button-link.secondary {
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(0, 118, 165, .18);
      box-shadow: none;
    }

    button.danger {
      color: #fff;
      background: linear-gradient(135deg, var(--danger), #ff90a1);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .screen {
      display: none;
      animation: fadeIn .25s ease both;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel,
    .card,
    .hud-card,
    .stage,
    .side-card,
    .modal,
    .map-card,
    .world-card,
    .tutorial-card,
    .speech-stage {
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.62)),
        radial-gradient(circle at 18% 0%, rgba(0,168,216,.14), transparent 34%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel {
      border-radius: 32px;
      overflow: hidden;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 22px;
    }

    .mode-card {
      position: relative;
      min-height: 250px;
      padding: 24px;
      border-radius: 26px;
      color: var(--navy);
      cursor: pointer;
      overflow: hidden;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .mode-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 168, 216, .48);
      box-shadow: 0 24px 56px rgba(0, 122, 170, .22);
    }

    .mode-icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(0,168,216,.18), rgba(255,224,110,.35));
      border: 1px solid rgba(0, 140, 190, .18);
      font-size: 32px;
      box-shadow: inset 0 -4px 0 rgba(0, 120, 170, .08);
    }

    .mode-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: .03em;
    }

    .mode-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-weight: 800;
    }

    .tag,
    .lesson-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--navy);
      background: rgba(255,224,110,.42);
      border: 1px solid rgba(255, 200, 40, .28);
      font-weight: 1000;
      font-size: 12px;
    }

    .tag {
      position: absolute;
      right: 18px;
      bottom: 18px;
    }

    .tutorial-card,
    .map-wrap {
      padding: 22px;
      border-radius: 32px;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .map-header h2 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 36px);
    }

    .map-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 800;
    }

    .map-grid,
    .world-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .map-grid {
      margin-bottom: 18px;
    }

    .map-card,
    .world-card {
      padding: 14px;
      border-radius: 18px;
      color: var(--navy);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 100, 145, .10);
      transition: transform .15s ease, opacity .15s ease, border-color .15s ease;
    }

    .map-card:hover,
    .world-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 168, 216, .48);
    }

    .map-card.locked,
    .world-card.locked {
      opacity: .55;
      cursor: default;
      filter: grayscale(.3);
    }

    .map-card.locked {
      cursor: pointer;
    }

    .world-card.locked:hover {
      transform: none;
      border-color: var(--line);
    }

    .map-card strong,
    .world-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .map-card span,
    .world-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.55;
    }

    .map-card .status,
    .world-card .status {
      margin-top: 8px;
      color: var(--blue);
      font-weight: 1000;
    }

    .actions,
    .game-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .speech-stage {
      min-height: 340px;
      display: grid;
      place-items: center;
      padding: 20px;
      border-radius: 28px;
    }

    .speech-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 16px;
      width: min(780px, 100%);
      align-items: end;
    }

    .speech-row.reverse {
      grid-template-columns: minmax(0, 1fr) 96px;
    }

    .speech-row.reverse img {
      grid-column: 2;
      grid-row: 1;
    }

    .speech-row.reverse .speech-bubble {
      grid-column: 1;
      grid-row: 1;
    }

    .speech-row img {
      width: 88px;
      height: 88px;
      object-fit: contain;
      border-radius: 22px;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(0,118,165,.14);
      filter: drop-shadow(0 10px 18px rgba(0, 100, 145, .20));
    }

    .speech-bubble {
      position: relative;
      padding: 18px 20px;
      border-radius: 24px;
      color: var(--navy);
      background: rgba(255,255,255,.92);
      box-shadow: 0 16px 40px rgba(0, 100, 145, .16);
      font-weight: 900;
      line-height: 1.85;
    }

    .speech-name {
      display: inline-flex;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--aqua), var(--yellow));
      color: var(--navy);
      font-size: 13px;
      font-weight: 1000;
    }

    .speech-text {
      min-height: 58px;
      font-size: clamp(16px, 2vw, 20px);
    }

    .speech-progress {
      margin-top: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .tutorial-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .tutorial-actions.two {
      grid-template-columns: 1fr 1fr;
    }

    .tutorial-actions.hidden {
      display: none;
    }

    .tutorial-choice {
      min-height: 76px;
      border-radius: 18px;
      white-space: normal;
      line-height: 1.5;
    }

    .game-layout {
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 18px;
    }

    .game-main {
      min-height: 600px;
      padding: 22px;
      border-radius: 32px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .hud-card {
      padding: 14px;
      border-radius: 20px;
      text-align: center;
    }

    .hud-card span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .hud-card strong {
      font-size: 23px;
    }

    .stage {
      position: relative;
      min-height: 380px;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: hidden;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,224,110,.20), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.76), rgba(219,249,255,.62));
    }

    .character-mark {
      position: absolute;
      left: 24px;
      bottom: 28px;
      width: 110px;
      height: 110px;
      background: url("./ニコリヒト.png") center / contain no-repeat;
      opacity: .18;
      filter: drop-shadow(0 12px 20px rgba(0, 120, 170, .30));
    }

    .word-box {
      position: relative;
      z-index: 2;
      width: min(760px, 100%);
      text-align: center;
    }

    .jp-word {
      margin-bottom: 14px;
      color: #052e45;
      font-size: clamp(34px, 5vw, 62px);
      font-weight: 1000;
      letter-spacing: .06em;
      line-height: 1.42;
    }

    .roma-word {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
      min-height: 76px;
      padding: 17px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(0, 120, 170, .18);
      color: var(--navy);
      font-size: clamp(28px, 4vw, 46px);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .04em;
    }

    .typed {
      color: var(--good);
      opacity: .68;
    }

    .current {
      color: #008fbd;
      text-decoration: underline;
      text-underline-offset: 7px;
    }

    .remaining {
      color: var(--navy);
    }

    .message {
      min-height: 30px;
      margin-top: 18px;
      color: var(--muted);
      font-weight: 900;
    }

    .time-gauge-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(0, 120, 170, .14);
    }

    .time-gauge-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .time-gauge {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0, 120, 170, .10);
      border: 1px solid rgba(0, 120, 170, .12);
    }

    .time-gauge > div {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--good), var(--blue2), var(--yellow));
      transition: width .16s ease;
    }

    .time-gauge.warning > div {
      background: linear-gradient(90deg, var(--yellow), #fff2b3);
    }

    .time-gauge.danger > div {
      background: linear-gradient(90deg, var(--danger), #ffb08e);
    }

    .keyboard-guide {
      margin-top: 16px;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(0, 120, 170, .14);
      display: grid;
      gap: 8px;
    }

    .keyboard-guide.hidden {
      display: none;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      min-width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: var(--navy);
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(0, 120, 170, .18);
      font-weight: 1000;
      font-size: 13px;
      box-shadow: inset 0 -3px 0 rgba(0, 120, 170, .10), 0 6px 12px rgba(0, 120, 170, .08);
      transition: transform .12s ease, background .12s ease, color .12s ease, box-shadow .12s ease;
    }

    .key.wide {
      min-width: 72px;
    }

    .key.space {
      min-width: 220px;
    }

    .key.active {
      transform: translateY(-2px);
      color: #062f45;
      background: linear-gradient(135deg, var(--aqua), var(--yellow));
      box-shadow:
        inset 0 -3px 0 rgba(0, 120, 170, .16),
        0 0 0 4px rgba(0, 168, 216, .16);
    }

    .key.shift-active {
      color: #fff;
      background: linear-gradient(135deg, #06354f, #00a8d8);
    }

    .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .side-card {
      padding: 18px;
      border-radius: 26px;
    }

    .side-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .side-card p,
    .side-card li {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.7;
    }

    .side-card ul {
      margin: 0;
      padding-left: 20px;
    }

    .quest-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .quest-list li {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.52);
      border: 1px solid rgba(0,118,165,.12);
      color: var(--navy);
      font-weight: 900;
    }

    .settings-backdrop,
    .result-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 80, 120, .22);
      backdrop-filter: blur(6px);
    }

    .settings-backdrop.open,
    .result-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      border-radius: 30px;
      padding: 22px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal h2 {
      margin: 0;
      font-size: 26px;
    }

    .setting-group {
      padding: 14px 0;
      border-top: 1px solid rgba(0, 118, 165, .14);
    }

    .setting-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 1000;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .segmented button {
      box-shadow: none;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(0, 118, 165, .18);
    }

    .segmented button.active {
      background: linear-gradient(135deg, var(--blue2), var(--aqua), var(--yellow));
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 14px 0 18px;
    }

    .result-item {
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.66);
      border: 1px solid rgba(0, 118, 165, .14);
      text-align: center;
    }

    .result-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .result-item strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .mode-grid,
      .game-layout {
        grid-template-columns: 1fr;
      }

      .mode-card {
        min-height: auto;
      }

      .side {
        grid-template-columns: 1fr 1fr;
      }

      .map-grid,
      .world-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 18px, 1180px);
        padding-top: 16px;
      }

      header {
        display: grid;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .side,
      .result-grid,
      .tutorial-actions {
        grid-template-columns: 1fr;
      }

      .map-header {
        display: grid;
      }

      .keyboard-guide {
        overflow-x: auto;
      }

      .keyboard-row {
        justify-content: flex-start;
      }

      .key.space {
        min-width: 150px;
      }

      .game-main {
        padding: 16px;
        border-radius: 26px;
      }

      .speech-row,
      .speech-row.reverse {
        grid-template-columns: 68px minmax(0, 1fr);
      }

      .speech-row.reverse img {
        grid-column: 1;
      }

      .speech-row.reverse .speech-bubble {
        grid-column: 2;
      }

      .speech-row img {
        width: 62px;
        height: 62px;
      }
    }
  </style>
</head>

<body>
