<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>誕生日クリッカー</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffe6c7, #fff6b8);
      min-height: 100vh;
    }

    .balloon-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .balloon {
      position: absolute;
      top: -120px;
      border-radius: 50%;
      opacity: 0.9;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 1px;
      height: 60px;
      background: rgba(255,255,255,0.9);
      transform: translateX(-50%);
    }

    @keyframes fall {
      0% {
        transform: translateY(-140px) translateX(0) rotate(0deg);
      }
      25% {
        transform: translateY(25vh) translateX(20px) rotate(4deg);
      }
      50% {
        transform: translateY(50vh) translateX(-18px) rotate(-4deg);
      }
      75% {
        transform: translateY(75vh) translateX(14px) rotate(3deg);
      }
      100% {
        transform: translateY(120vh) translateX(-8px) rotate(-2deg);
      }
    }

    .main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .name-badge {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 24px;
      color: #444;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      margin-bottom: 18px;
    }

    .score-box {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 18px 34px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.14);
      text-align: center;
      margin-bottom: 18px;
    }

    .score-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: #888;
    }

    .score {
      font-size: 72px;
      font-weight: 900;
      color: #333;
      line-height: 1.1;
    }

    .cake-button {
      border: none;
      border-radius: 38px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      font-size: 110px;
      padding: 24px 42px;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(0,0,0,0.18);
      transition: transform 0.12s ease;
    }

    .cake-button:hover {
      transform: scale(1.04);
    }

    .cake-button:active {
      transform: scale(0.92);
    }

    .controls {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 18px;
      background: rgba(255,255,255,0.85);
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 800;
      color: #444;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      transition: transform 0.12s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .small-box {
      border-radius: 18px;
      background: rgba(255,255,255,0.85);
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 900;
      color: #444;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .burst {
      position: fixed;
      font-size: 34px;
      font-weight: 900;
      color: #e91e63;
      pointer-events: none;
      z-index: 15;
      animation: burstUp 0.9s ease-out forwards;
      text-shadow: 0 4px 10px rgba(255,255,255,0.8);
    }

    @keyframes burstUp {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.8);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-45px) scale(1.15);
      }
    }

    .settings-toggle {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      width: 62px;
      height: 62px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(0,0,0,0.16);
    }

    .settings-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 21;
      width: 320px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      box-shadow: 0 16px 34px rgba(0,0,0,0.18);
      padding: 18px;
      display: none;
    }

    .settings-panel.open {
      display: block;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }

    .close-btn {
      border: none;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
      color: #666;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: #555;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      background: rgba(255,255,255,0.92);
      outline: none;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .color-btn {
      height: 46px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .color-btn.active {
      outline: 4px solid rgba(80,80,80,0.35);
    }

    .reset-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 13px 16px;
      background: #2f3640;
      color: white;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
      margin-top: 6px;
    }

    @media (max-width: 600px) {
      .score {
        font-size: 54px;
      }

      .cake-button {
        font-size: 88px;
        padding: 20px 30px;
      }

      .name-badge {
        font-size: 18px;
      }

      .settings-panel {
        width: calc(100vw - 24px);
        right: 12px;
        bottom: 12px;
      }

      .settings-toggle {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="balloon-layer" id="balloonLayer"></div>

  <div class="main">
    <div class="name-badge" id="nameBadge">🎂 おともだち 8さい</div>

    <div class="score-box">
      <div class="score-label">CAKE</div>
      <div class="score" id="score">0</div>
    </div>

    <button class="cake-button" id="cakeButton">🎂</button>

    <div class="controls">
      <button class="btn" id="musicButton">🎵 曲を流す</button>
      <button class="btn" id="minusButton">－</button>
      <div class="small-box" id="perClickBox">+1</div>
      <button class="btn" id="plusButton">＋</button>
    </div>
  </div>

  <button class="settings-toggle" id="settingsToggle">⚙</button>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span>設定</span>
      <button class="close-btn" id="closeSettings">×</button>
    </div>

    <div class="field">
      <label for="personName">だれを祝う？</label>
      <input id="personName" type="text" value="おともだち">
    </div>

    <div class="field">
      <label for="ageInput">年齢</label>
      <input id="ageInput" type="number" min="0" max="150" value="8">
    </div>

    <div class="field">
      <label>テーマカラー</label>
      <div class="color-grid">
        <button class="color-btn active" data-theme="pink" style="background:#f7a8c4;"></button>
        <button class="color-btn" data-theme="blue" style="background:#8fd3ff;"></button>
        <button class="color-btn" data-theme="purple" style="background:#c7a3ff;"></button>
        <button class="color-btn" data-theme="mint" style="background:#8fe3c2;"></button>
      </div>
    </div>

    <button class="reset-btn" id="resetButton">リセット</button>
  </div>

  <audio id="birthdayMusic" src="./birthday.mp3" loop></audio>

  <script>
    const balloonLayer = document.getElementById("balloonLayer");
    const scoreEl = document.getElementById("score");
    const cakeButton = document.getElementById("cakeButton");
    const musicButton = document.getElementById("musicButton");
    const minusButton = document.getElementById("minusButton");
    const plusButton = document.getElementById("plusButton");
    const perClickBox = document.getElementById("perClickBox");
    const settingsToggle = document.getElementById("settingsToggle");
    const settingsPanel = document.getElementById("settingsPanel");
    const closeSettings = document.getElementById("closeSettings");
    const personNameInput = document.getElementById("personName");
    const ageInput = document.getElementById("ageInput");
    const nameBadge = document.getElementById("nameBadge");
    const resetButton = document.getElementById("resetButton");
    const colorButtons = document.querySelectorAll(".color-btn");
    const music = document.getElementById("birthdayMusic");

    let count = 0;
    let perClick = 1;
    let playing = false;

    function updateScore() {
      scoreEl.textContent = count;
    }

    function updatePerClick() {
      perClickBox.textContent = "+" + perClick;
    }

    function updateBadge() {
      const name = personNameInput.value || "おともだち";
      const age = Number(ageInput.value || 0);
      nameBadge.textContent = "🎂 " + name + (age > 0 ? " " + age + "さい" : "");
    }

    function createBalloon() {
      const balloon = document.createElement("div");
      balloon.className = "balloon";

      const size = 28 + Math.random() * 46;
      const left = Math.random() * 96;
      const duration = 4.8 + Math.random() * 4.7;
      const hue = Math.floor(Math.random() * 360);
      const delay = Math.random() * 2;

      balloon.style.width = size + "px";
      balloon.style.height = size * 1.2 + "px";
      balloon.style.left = left + "%";
      balloon.style.animationDuration = duration + "s";
      balloon.style.animationDelay = delay + "s";
      balloon.style.background =
        `radial-gradient(circle at 30% 25%, rgba(255,255,255,.9), rgba(255,255,255,.28) 18%, transparent 19%), linear-gradient(180deg, hsla(${hue},95%,88%,.96), hsla(${hue},85%,72%,.92))`;

      balloonLayer.appendChild(balloon);
    }

    for (let i = 0; i < 64; i++) {
      createBalloon();
    }

    function createBurst() {
      const burst = document.createElement("div");
      burst.className = "burst";
      const emojis = ["🎉", "✨", "🍰", "🎈"];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      burst.textContent = emoji + " +" + perClick;
      burst.style.left = (window.innerWidth * (0.42 + Math.random() * 0.16)) + "px";
      burst.style.top = (window.innerHeight * (0.44 + Math.random() * 0.12)) + "px";
      document.body.appendChild(burst);

      setTimeout(() => {
        burst.remove();
      }, 900);
    }

    cakeButton.addEventListener("click", () => {
      count += perClick;
      updateScore();
      createBurst();
    });

    minusButton.addEventListener("click", () => {
      perClick = Math.max(1, perClick - 1);
      updatePerClick();
    });

    plusButton.addEventListener("click", () => {
      perClick = Math.min(99, perClick + 1);
      updatePerClick();
    });

    musicButton.addEventListener("click", async () => {
      try {
        if (playing) {
          music.pause();
          playing = false;
          musicButton.textContent = "🎵 曲を流す";
        } else {
          await music.play();
          playing = true;
          musicButton.textContent = "⏸ 曲を止める";
        }
      } catch (e) {
        alert("birthday.mp3 が見つからないか、再生できません。");
      }
    });

    settingsToggle.addEventListener("click", () => {
      settingsPanel.classList.add("open");
      settingsToggle.style.display = "none";
    });

    closeSettings.addEventListener("click", () => {
      settingsPanel.classList.remove("open");
      settingsToggle.style.display = "block";
    });

    personNameInput.addEventListener("input", updateBadge);
    ageInput.addEventListener("input", updateBadge);

    resetButton.addEventListener("click", () => {
      count = 0;
      perClick = 1;
      updateScore();
      updatePerClick();
    });

    const themes = {
      pink: "linear-gradient(135deg, #ffd6e7, #ffe6c7, #fff6b8)",
      blue: "linear-gradient(135deg, #d6f0ff, #d8e8ff, #eef3ff)",
      purple: "linear-gradient(135deg, #efd8ff, #ffdff6, #ffe7ea)",
      mint: "linear-gradient(135deg, #d9fff2, #dcfff9, #e6faff)"
    };

    colorButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        colorButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const theme = btn.dataset.theme;
        document.body.style.background = themes[theme];
      });
    });

    updateScore();
    updatePerClick();
    updateBadge();
  </script>
</body>
</html>
