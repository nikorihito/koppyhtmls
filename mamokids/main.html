<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まもきっず - main</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .hidden { display: none !important; }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 48px);
      gap: 20px;
    }

    .sidebar, .main-panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    .profile-box {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: #f8fafc;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #cbd5e1, #e2e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .nav-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .menu-button {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .menu-button.active {
      background: #e2e8f0;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    input[type="text"],
    input[type="password"],
    select {
      height: 48px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.6;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      min-height: 48px;
      border: none;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 18px;
    }

    .button.full { width: 100%; }

    .button.sub {
      background: #fff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .button.ghost {
      background: #e2e8f0;
      color: #0f172a;
    }

    .button.small {
      min-height: 40px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 12px;
    }

    .button.warn {
      background: #dc2626;
      color: #fff;
    }

    .button.yellow {
      background: #ca8a04;
      color: #fff;
    }

    .item-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .item-card h4 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .item-meta {
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .item-value {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.7;
    }

    .state-card {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      background: #ffffff;
      border: 2px solid #cbd5e1;
    }

    .state-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .state-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      word-break: break-word;
    }

    .state-sub {
      margin-top: 8px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
    }

    .state-on {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .state-off {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .state-waiting {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .state-request {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .empty {
      padding: 18px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: #64748b;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .fab-chat {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: none;
      background: #0f172a;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 16px 35px rgba(15, 23, 42, 0.2);
      z-index: 20;
    }

    .fab-logout {
      position: fixed;
      right: 20px;
      bottom: 20px;
      min-width: 120px;
      height: 56px;
      border-radius: 999px;
      border: none;
      background: #dc2626;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 35px rgba(220, 38, 38, 0.28);
      z-index: 20;
      padding: 0 20px;
    }

    .chat-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.36);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      z-index: 30;
    }

    .chat-box {
      width: 100%;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header, .chat-footer {
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .chat-footer {
      border-top: 1px solid #e2e8f0;
      border-bottom: none;
    }

    .chat-tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .chat-tab {
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-tab.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }

    .chat-messages {
      flex: 1;
      overflow: auto;
      padding: 16px;
      background: #f8fafc;
    }

    .chat-bubble {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 16px;
      margin-bottom: 10px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .chat-bubble.me {
      background: #0f172a;
      color: #fff;
      margin-left: auto;
    }

    .chat-bubble.other {
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .chat-name {
      font-size: 11px;
      margin-bottom: 4px;
      color: #64748b;
    }

    .row-gap { margin-top: 14px; }

    .warning-red {
      border-left: 6px solid #dc2626;
      background: #fef2f2;
    }

    .warning-yellow {
      border-left: 6px solid #ca8a04;
      background: #fefce8;
    }

    .warning-box {
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 12px;
      line-height: 1.6;
      font-size: 14px;
    }

    .warning-box.red {
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    .warning-box.yellow {
      background: #fefce8;
      border: 1px solid #fde68a;
    }

    .inline-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 100px;
      transform: translateX(-50%);
      background: #0f172a;
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 16px 35px rgba(15, 23, 42, 0.25);
      z-index: 50;
      min-width: 280px;
      max-width: calc(100vw - 32px);
      text-align: center;
      line-height: 1.6;
    }

    .emoji-preview-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .emoji-preview {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .emoji-help {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .emoji-button {
      height: 48px;
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 14px;
      font-size: 24px;
      cursor: pointer;
    }

    .emoji-button.active {
      border-color: #0f172a;
      background: #e2e8f0;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page { padding: 14px; }

      .sidebar, .main-panel {
        padding: 20px;
        border-radius: 20px;
      }

      .fab-logout {
        min-width: 104px;
        height: 50px;
        font-size: 14px;
      }

      .inline-two {
        grid-template-columns: 1fr;
      }

      .state-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="profile-box">
          <div class="avatar" id="sidebarAvatar">🙂</div>
          <div>
            <div class="badge" id="sidebarRole">-</div>
            <div style="font-weight:700; font-size:18px;" id="sidebarId">-</div>
          </div>
        </div>

        <div class="nav-title">メニュー</div>
        <button class="menu-button active" data-panel="dashboard">ホーム</button>
        <button class="menu-button" data-panel="items">管理項目</button>
        <button class="menu-button" data-panel="links">連携</button>
        <button class="menu-button" data-panel="account">アカウント編集</button>
        <button class="menu-button hidden" id="adminMenuButton" data-panel="admin">管理者パネル</button>
      </aside>

      <main class="main-panel">
        <section id="panel-dashboard">
          <div class="panel-title">
            <div>
              <div class="badge" id="welcomeRole">-</div>
              <h2 id="welcomeTitle">ホーム</h2>
            </div>
          </div>

          <div class="section" id="dashboardSummary"></div>

          <div class="section">
            <h3 class="section-title">受信した警告</h3>
            <div id="warningListContainer"></div>
          </div>
        </section>

        <section id="panel-items" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">管理項目</div>
              <h2>管理項目の確認</h2>
            </div>
            <button class="button" id="openAddItemButton">管理項目を追加する</button>
          </div>

          <div class="section hidden" id="addItemSection">
            <h3 class="section-title">管理項目を追加</h3>

            <label for="itemName">名前</label>
            <input id="itemName" type="text" placeholder="例：帰宅報告、宿題チェック" />

            <label for="itemType" style="margin-top:16px;">管理項目の種類</label>
            <select id="itemType">
              <option value="warning">警告管理</option>
              <option value="toggle">ON/OFF管理</option>
              <option value="text">子供記述式管理</option>
            </select>

            <div id="warningFields" class="row-gap">
              <label for="warningMessage">警告文</label>
              <textarea id="warningMessage" placeholder="子供に送る警告文を入力"></textarea>

              <label for="warningLevel" style="margin-top:16px;">警告レベル</label>
              <select id="warningLevel">
                <option value="red">赤</option>
                <option value="yellow">黄</option>
              </select>
            </div>

            <div id="toggleFields" class="row-gap hidden">
              <label for="toggleMessage">ON/OFF項目の説明</label>
              <textarea id="toggleMessage" placeholder="例：ゲーム時間を許可するかどうか"></textarea>

              <div class="inline-two row-gap">
                <div>
                  <label for="toggleOnLabel">ON時の表示</label>
                  <input id="toggleOnLabel" type="text" placeholder="例：●●" />
                </div>
                <div>
                  <label for="toggleOffLabel">OFF時の表示</label>
                  <input id="toggleOffLabel" type="text" placeholder="例：○○" />
                </div>
              </div>

              <label for="toggleDefault" style="margin-top:16px;">初期状態</label>
              <select id="toggleDefault">
                <option value="OFF">OFF</option>
                <option value="ON">ON</option>
              </select>
            </div>

            <div id="textFields" class="row-gap hidden">
              <label for="textRequest">子供への記述依頼</label>
              <textarea id="textRequest" placeholder="例：今日がんばったことを1つ書いてね"></textarea>
            </div>

            <div class="button-row row-gap">
              <button class="button" id="addItemButton">追加する</button>
              <button class="button ghost" id="closeAddItemButton">閉じる</button>
            </div>
          </div>

          <div id="itemsContainer"></div>
        </section>

        <section id="panel-links" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">連携</div>
              <h2>子供と連携する</h2>
            </div>
          </div>

          <div class="section" id="linkParentSection">
            <h3 class="section-title">連携設定</h3>
            <label for="linkChildId">子供のアカウントID</label>
            <input id="linkChildId" type="text" placeholder="子供のアカウントIDを入力" />
            <button class="button full row-gap" id="linkChildButton">連携する</button>
          </div>

          <div id="linksContainer"></div>
        </section>

        <section id="panel-account" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">アカウント編集</div>
              <h2>アカウント設定</h2>
            </div>
          </div>

          <div class="section">
            <h3 class="section-title">絵文字アイコン変更</h3>
            <div class="emoji-preview-wrap">
              <div class="emoji-preview" id="accountEmojiPreview">🧒</div>
              <div class="emoji-help">
                候補から選ぶか、入力欄に直接好きな絵文字を入力できます。<br>
                空欄なら権限ごとの既定絵文字になります。
              </div>
            </div>

            <label for="accountEmojiInput">アカウント絵文字</label>
            <input id="accountEmojiInput" type="text" placeholder="例：🐱 や 🚀 や 😀" maxlength="8" />

            <div class="emoji-grid" id="accountEmojiGrid">
              <button type="button" class="emoji-button" data-emoji="😀">😀</button>
              <button type="button" class="emoji-button" data-emoji="😺">😺</button>
              <button type="button" class="emoji-button" data-emoji="🐱">🐱</button>
              <button type="button" class="emoji-button" data-emoji="🐶">🐶</button>
              <button type="button" class="emoji-button" data-emoji="🐰">🐰</button>
              <button type="button" class="emoji-button" data-emoji="🦊">🦊</button>
              <button type="button" class="emoji-button" data-emoji="🐼">🐼</button>
              <button type="button" class="emoji-button" data-emoji="🧒">🧒</button>
              <button type="button" class="emoji-button" data-emoji="👦">👦</button>
              <button type="button" class="emoji-button" data-emoji="👧">👧</button>
              <button type="button" class="emoji-button" data-emoji="👩">👩</button>
              <button type="button" class="emoji-button" data-emoji="👨">👨</button>
              <button type="button" class="emoji-button" data-emoji="👪">👪</button>
              <button type="button" class="emoji-button" data-emoji="🌟">🌟</button>
              <button type="button" class="emoji-button" data-emoji="🎮">🎮</button>
              <button type="button" class="emoji-button" data-emoji="📚">📚</button>
              <button type="button" class="emoji-button" data-emoji="📝">📝</button>
              <button type="button" class="emoji-button" data-emoji="🚀">🚀</button>
              <button type="button" class="emoji-button" data-emoji="🍀">🍀</button>
              <button type="button" class="emoji-button" data-emoji="🔧">🔧</button>
              <button type="button" class="emoji-button" data-emoji="🎵">🎵</button>
              <button type="button" class="emoji-button" data-emoji="💡">💡</button>
              <button type="button" class="emoji-button" data-emoji="🛠️">🛠️</button>
              <button type="button" class="emoji-button" data-emoji="🏆">🏆</button>
              <button type="button" class="emoji-button" data-emoji="🎨">🎨</button>
              <button type="button" class="emoji-button" data-emoji="📦">📦</button>
              <button type="button" class="emoji-button" data-emoji="🧠">🧠</button>
              <button type="button" class="emoji-button" data-emoji="⚡">⚡</button>
              <button type="button" class="emoji-button" data-emoji="🌈">🌈</button>
              <button type="button" class="emoji-button" data-emoji="🧸">🧸</button>
            </div>

            <div class="button-row row-gap">
              <button class="button ghost" id="clearEmojiButton" type="button">絵文字をクリア</button>
              <button class="button" id="saveEmojiButton">絵文字を保存する</button>
            </div>
          </div>

          <div class="section">
            <h3 class="section-title">パスワード変更</h3>
            <label for="newPassword">新しいパスワード</label>
            <input id="newPassword" type="password" placeholder="6文字以上の新しいパスワード" />
            <button class="button row-gap" id="changePasswordButton">パスワードを変更する</button>
          </div>
        </section>

        <section id="panel-admin" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">管理者パネル</div>
              <h2>全体管理</h2>
            </div>
          </div>

          <div class="section">
            <h3 class="section-title">概要</h3>
            <div id="adminOverview"></div>
          </div>

          <div class="section">
            <h3 class="section-title">全アカウント一覧</h3>
            <div id="adminAccountsContainer"></div>
          </div>

          <div class="section">
            <h3 class="section-title">全管理項目一覧</h3>
            <div id="adminItemsContainer"></div>
          </div>

          <div class="section">
            <h3 class="section-title">全チャットルーム一覧</h3>
            <div id="adminRoomsContainer"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <button class="fab-chat" id="chatFab">💬</button>
  <button class="fab-logout" id="logoutButton">ログアウト</button>

  <div class="chat-modal hidden" id="chatModal">
    <div class="chat-box">
      <div class="chat-header">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center;">
          <div>
            <div class="badge">チャット</div>
            <div style="font-weight:700; font-size:18px;">チャット</div>
          </div>
          <button class="button ghost small" id="closeChatButton">閉じる</button>
        </div>

        <div class="chat-tabs">
          <button class="chat-tab active" data-chat-kind="direct">個別</button>
          <button class="chat-tab" data-chat-kind="group">グループ</button>
          <button class="chat-tab" data-chat-kind="memo">メモ</button>
        </div>

        <div id="chatDirectControls" class="row-gap">
          <label for="chatPartnerSelect">相手</label>
          <select id="chatPartnerSelect"></select>
        </div>

        <div id="chatGroupControls" class="row-gap hidden">
          <label for="groupRoomSelect">グループ</label>
          <select id="groupRoomSelect"></select>

          <div class="section row-gap" id="groupCreateSection" style="margin-bottom:0;">
            <h3 class="section-title">グループ作成</h3>
            <label for="groupNameInput">グループ名</label>
            <input id="groupNameInput" type="text" placeholder="例：家族連絡、宿題連絡" />

            <label style="margin-top:16px;">参加メンバー</label>
            <div id="groupMemberContainer"></div>

            <button class="button row-gap" id="createGroupButton">グループを作成する</button>
          </div>
        </div>

        <div id="chatMemoControls" class="row-gap hidden">
          <div class="item-meta">自分専用のメモチャットです。</div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-footer">
        <textarea id="chatInput" placeholder="メッセージを入力"></textarea>
        <button class="button full row-gap" id="sendChatButton">送信する</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toastBox"></div>

  <script type="module">
    import {
      auth,
      db,
      serverTimestamp,
      ROLE_LABELS,
      ITEM_TYPE_LABELS,
      nl2br,
      escapeHtml
    } from "./firebase-config.js";

    import {
      onAuthStateChanged,
      signOut,
      updatePassword
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    import {
      doc,
      getDoc,
      addDoc,
      updateDoc,
      deleteDoc,
      collection,
      query,
      where,
      onSnapshot,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    let currentUser = null;
    let currentPanel = "dashboard";

    let currentItems = [];
    let currentPartners = [];
    let currentWarnings = [];

    let partnerUnsubscribe = null;
    let itemsUnsubscribe = null;
    let warningsUnsubscribe = null;
    let chatRoomsUnsubscribe = null;
    let chatMessagesUnsubscribe = null;

    let usersCache = new Map();
    let lastRequestStateMap = new Map();

    let adminUsers = [];
    let adminLinks = [];
    let adminItems = [];
    let adminRooms = [];
    let adminMessages = [];

    let currentChatKind = "direct";
    let currentRooms = [];
    let currentRoomMessages = [];

    const sidebarAvatar = document.getElementById("sidebarAvatar");
    const sidebarRole = document.getElementById("sidebarRole");
    const sidebarId = document.getElementById("sidebarId");
    const welcomeRole = document.getElementById("welcomeRole");
    const welcomeTitle = document.getElementById("welcomeTitle");
    const dashboardSummary = document.getElementById("dashboardSummary");
    const itemsContainer = document.getElementById("itemsContainer");
    const linksContainer = document.getElementById("linksContainer");
    const warningListContainer = document.getElementById("warningListContainer");
    const toastBox = document.getElementById("toastBox");
    const adminMenuButton = document.getElementById("adminMenuButton");

    const accountEmojiInput = document.getElementById("accountEmojiInput");
    const accountEmojiPreview = document.getElementById("accountEmojiPreview");
    const accountEmojiButtons = Array.from(document.querySelectorAll("#accountEmojiGrid .emoji-button"));

    const chatPartnerSelect = document.getElementById("chatPartnerSelect");
    const chatMessages = document.getElementById("chatMessages");
    const groupRoomSelect = document.getElementById("groupRoomSelect");
    const groupMemberContainer = document.getElementById("groupMemberContainer");

    function showToast(message) {
      toastBox.textContent = message;
      toastBox.classList.remove("hidden");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toastBox.classList.add("hidden");
      }, 3000);
    }

    function getDefaultAvatarEmoji(user) {
      if (!user) return "❔";
      if (user.role === "admin") return "🔧";
      if (user.avatarEmoji && user.avatarEmoji.trim()) return user.avatarEmoji;
      if (user.role === "parent") return "👪";
      if (user.role === "child") return "🧒";
      return "🙂";
    }

    function renderAvatar(element, user) {
      element.textContent = getDefaultAvatarEmoji(user);
    }

    function renderAccountEmojiEditor() {
      const value = (accountEmojiInput?.value || "").trim();
      const fallbackEmoji = currentUser ? getDefaultAvatarEmoji(currentUser) : "🙂";

      accountEmojiPreview.textContent = value || fallbackEmoji;
      accountEmojiButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.emoji === value);
      });
    }

    function setActivePanel(panelName) {
      currentPanel = panelName;

      document.querySelectorAll(".menu-button[data-panel]").forEach((button) => {
        button.classList.toggle("active", button.dataset.panel === panelName);
      });

      document.getElementById("panel-dashboard").classList.toggle("hidden", panelName !== "dashboard");
      document.getElementById("panel-items").classList.toggle("hidden", panelName !== "items");
      document.getElementById("panel-links").classList.toggle("hidden", panelName !== "links");
      document.getElementById("panel-account").classList.toggle("hidden", panelName !== "account");
      document.getElementById("panel-admin").classList.toggle("hidden", panelName !== "admin");
    }

    function renderDashboard() {
      if (!currentUser) return;

      dashboardSummary.innerHTML = `
        <div class="badge">概要</div>
        <p><strong>ログイン中の権限：</strong>${ROLE_LABELS[currentUser.role] || currentUser.role || "-"}</p>
        <p><strong>アカウントID：</strong>${escapeHtml(currentUser.accountId || "-")}</p>
        <p><strong>連携中ユーザー数：</strong>${Array.isArray(currentPartners) ? currentPartners.length : 0}</p>
        <p><strong>確認できる管理項目数：</strong>${Array.isArray(currentItems) ? currentItems.length : 0}</p>
        <p style="margin-bottom:0;">左のメニューから必要な機能を選べます。</p>
      `;
    }

    function renderWarnings() {
      if (!currentUser || currentUser.role !== "child") {
        warningListContainer.innerHTML = `<div class="empty">この権限では警告一覧は表示されません。</div>`;
        return;
      }

      if (!Array.isArray(currentWarnings) || currentWarnings.length === 0) {
        warningListContainer.innerHTML = `<div class="empty">警告はまだありません。</div>`;
        return;
      }

      const sorted = [...currentWarnings].sort((a, b) => {
        const aTime = a.createdAt?.seconds || 0;
        const bTime = b.createdAt?.seconds || 0;
        return bTime - aTime;
      });

      warningListContainer.innerHTML = sorted.map((warning) => {
        const fromUser = usersCache.get(warning.parentUid);
        return `
          <div class="warning-box ${warning.level === "red" ? "red" : "yellow"}">
            <strong>${warning.level === "red" ? "赤警告" : "黄警告"}</strong><br>
            送信者：${escapeHtml(fromUser?.accountId || "保護者")}<br>
            内容：${nl2br(escapeHtml(warning.message || ""))}
          </div>
        `;
      }).join("");
    }

    async function getUserByUid(uid) {
      if (!uid) return null;
      if (usersCache.has(uid)) return usersCache.get(uid);

      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) return null;

      const raw = snap.data() || {};
      const user = {
        uid: raw.uid || uid,
        accountId: raw.accountId || "unknown",
        role: raw.role || "child",
        avatarEmoji: raw.avatarEmoji || ""
      };

      usersCache.set(uid, user);
      return user;
    }

    async function subscribePartners() {
      if (typeof partnerUnsubscribe === "function") partnerUnsubscribe();

      if (!currentUser) return;

      if (currentUser.role === "admin") {
        const q = query(collection(db, "users"), where("role", "==", "child"));
        partnerUnsubscribe = onSnapshot(q, (snapshot) => {
          const partners = snapshot.docs
            .map((docSnap) => {
              const raw = docSnap.data() || {};
              return {
                uid: raw.uid || docSnap.id,
                accountId: raw.accountId || "unknown",
                role: raw.role || "child",
                avatarEmoji: raw.avatarEmoji || ""
              };
            })
            .filter((u) => u.uid !== currentUser.uid);

          partners.forEach((user) => usersCache.set(user.uid, user));
          currentPartners = partners;
          renderLinks();
          renderChatPartnerOptions();
          renderGroupMemberOptions();
          renderDashboard();
        });
        return;
      }

      const q = currentUser.role === "parent"
        ? query(collection(db, "links"), where("parentUid", "==", currentUser.uid))
        : query(collection(db, "links"), where("childUid", "==", currentUser.uid));

      partnerUnsubscribe = onSnapshot(q, async (snapshot) => {
        const partnerUids = snapshot.docs.map((docSnap) => {
          const data = docSnap.data() || {};
          return currentUser.role === "parent" ? data.childUid : data.parentUid;
        });

        const partners = [];
        for (const uid of partnerUids) {
          const partner = await getUserByUid(uid);
          if (partner) partners.push(partner);
        }

        currentPartners = partners;
        renderLinks();
        renderChatPartnerOptions();
        renderGroupMemberOptions();
        renderDashboard();
      });
    }

    async function subscribeWarnings() {
      if (typeof warningsUnsubscribe === "function") warningsUnsubscribe();

      if (!currentUser || currentUser.role !== "child") {
        currentWarnings = [];
        renderWarnings();
        return;
      }

      const q = query(collection(db, "warnings"), where("childUid", "==", currentUser.uid));
      warningsUnsubscribe = onSnapshot(q, async (snapshot) => {
        const list = snapshot.docs.map((docSnap) => {
          const d = docSnap.data() || {};
          return {
            id: docSnap.id,
            parentUid: d.parentUid || "",
            childUid: d.childUid || "",
            level: d.level || "red",
            message: d.message || "",
            createdAt: d.createdAt || null
          };
        });

        for (const warning of list) {
          if (warning.parentUid && !usersCache.has(warning.parentUid)) {
            const user = await getUserByUid(warning.parentUid);
            if (user) usersCache.set(warning.parentUid, user);
          }
        }

        currentWarnings = list;
        renderWarnings();
      });
    }

    async function subscribeItems() {
      if (typeof itemsUnsubscribe === "function") itemsUnsubscribe();
      if (!currentUser) return;

      let q;
      if (currentUser.role === "admin") {
        q = collection(db, "managementItems");
      } else {
        q = currentUser.role === "parent"
          ? query(collection(db, "managementItems"), where("parentUid", "==", currentUser.uid))
          : query(collection(db, "managementItems"), where("childUid", "==", currentUser.uid));
      }

      itemsUnsubscribe = onSnapshot(q, async (snapshot) => {
        const items = snapshot.docs.map((docSnap) => {
          const d = docSnap.data() || {};
          return {
            id: docSnap.id,
            parentUid: d.parentUid || "",
            childUid: d.childUid || "",
            name: d.name || "無題",
            type: d.type || "text",
            message: d.message || "",
            warningLevel: d.warningLevel || "red",
            defaultValue: d.defaultValue || "OFF",
            onLabel: d.onLabel || "ON",
            offLabel: d.offLabel || "OFF",
            requestText: d.requestText || "",
            childResponse: d.childResponse || "",
            requestActive: d.requestActive === true,
            createdAt: d.createdAt || null,
            updatedAt: d.updatedAt || null
          };
        });

        for (const item of items) {
          if (item.parentUid && !usersCache.has(item.parentUid)) {
            const user = await getUserByUid(item.parentUid);
            if (user) usersCache.set(item.parentUid, user);
          }
          if (item.childUid && !usersCache.has(item.childUid)) {
            const user = await getUserByUid(item.childUid);
            if (user) usersCache.set(item.childUid, user);
          }
        }

        if (currentUser.role === "child") {
          items.forEach((item) => {
            const oldState = lastRequestStateMap.get(item.id);
            if (item.type === "text" && item.requestActive === true && oldState !== true) {
              showToast(`保護者から文章記述の要請が出ました：${item.requestText || item.name}`);
            }
            lastRequestStateMap.set(item.id, item.requestActive === true);
          });
        }

        currentItems = items;
        renderItems();
        renderDashboard();
      });
    }

    function renderLinks() {
      if (!Array.isArray(currentPartners) || currentPartners.length === 0) {
        linksContainer.innerHTML = `<div class="empty">まだ連携はありません。</div>`;
        return;
      }

      linksContainer.innerHTML = currentPartners.map((partner) => `
        <div class="item-card">
          <h4>${escapeHtml(partner.accountId || "unknown")}</h4>
          <div class="item-meta">権限：${ROLE_LABELS[partner.role] || partner.role || "-"}</div>
        </div>
      `).join("");
    }

    function buildWarningTargetOptions(itemId) {
      if (!Array.isArray(currentPartners) || currentPartners.length === 0) {
        return `<option value="">連携ユーザーなし</option>`;
      }

      const options = [`<option value="all">全員</option>`];
      currentPartners.forEach((partner) => {
        options.push(`<option value="${partner.uid}">${escapeHtml(partner.accountId || "unknown")}</option>`);
      });

      return `
        <label for="warningTarget-${itemId}">警告先</label>
        <select id="warningTarget-${itemId}">
          ${options.join("")}
        </select>
      `;
    }

    function renderItems() {
      if (!Array.isArray(currentItems) || currentItems.length === 0) {
        itemsContainer.innerHTML = `<div class="empty">まだ管理項目はありません。</div>`;
        return;
      }

      itemsContainer.innerHTML = currentItems.map((item) => {
        const parentId = usersCache.get(item.parentUid)?.accountId || "-";
        const childId = usersCache.get(item.childUid)?.accountId || "-";

        let className = "item-card";
        let detailHtml = "";
        let actionHtml = "";

        if (item.type === "warning") {
          className += item.warningLevel === "red" ? " warning-red" : " warning-yellow";

          detailHtml = `
            <div class="item-value">
              <strong>警告レベル：</strong>${item.warningLevel === "red" ? "赤" : "黄"}<br>
              <strong>警告文：</strong><br>
              ${nl2br(escapeHtml(item.message || ""))}
            </div>
          `;

          if (currentUser.role === "parent" || currentUser.role === "admin") {
            actionHtml = `
              <div class="row-gap">
                ${buildWarningTargetOptions(item.id)}
              </div>
              <div class="button-row row-gap">
                <button class="button ${item.warningLevel === "red" ? "warn" : "yellow"} small" data-warning-send="${item.id}">
                  警告する
                </button>
                <button class="button ghost small" data-delete-id="${item.id}">削除</button>
              </div>
            `;
          }
        }

        if (item.type === "toggle") {
          const currentState = item.childResponse || item.defaultValue || "OFF";
          const onLabel = item.onLabel || "ON";
          const offLabel = item.offLabel || "OFF";
          const displayLabel = currentState === "ON" ? onLabel : offLabel;

          detailHtml = `
            <div class="item-value">
              <strong>説明：</strong><br>
              ${nl2br(escapeHtml(item.message || ""))}
            </div>
            <div class="state-card ${currentState === "ON" ? "state-on" : "state-off"}">
              <div class="state-label">現在の状態</div>
              <div class="state-value">${escapeHtml(displayLabel)}</div>
              <div class="state-sub">
                ON時の表示：${escapeHtml(onLabel)} ／ OFF時の表示：${escapeHtml(offLabel)}
              </div>
            </div>
          `;

          if (currentUser.role === "parent" || currentUser.role === "admin") {
            actionHtml = `
              <div class="button-row row-gap">
                <button class="button small" data-toggle-id="${item.id}" data-value="ON">ONにする</button>
                <button class="button sub small" data-toggle-id="${item.id}" data-value="OFF">OFFにする</button>
                <button class="button ghost small" data-delete-id="${item.id}">削除</button>
              </div>
            `;
          }
        }

        if (item.type === "text") {
          detailHtml = `
            <div class="item-value">
              <strong>記述依頼：</strong><br>
              ${nl2br(escapeHtml(item.requestText || ""))}
            </div>
            <div class="state-card ${item.requestActive ? "state-request" : "state-waiting"}">
              <div class="state-label">現在の状態</div>
              <div class="state-value">${item.requestActive ? "入力待ち" : "待機中"}</div>
              <div class="state-sub">
                ${item.requestActive ? "子供の入力を待っています。" : "保護者が要請すると入力欄が有効になります。"}
              </div>
            </div>
            <div class="item-value">
              <strong>子供からの記述：</strong><br>
              ${item.childResponse ? nl2br(escapeHtml(item.childResponse)) : "まだ入力されていません。"}
            </div>
          `;

          if (currentUser.role === "child") {
            actionHtml = `
              <textarea id="reply-${item.id}" placeholder="依頼内容に対する記述を入力" ${item.requestActive ? "" : "disabled"}></textarea>
              <button class="button small row-gap" data-reply-id="${item.id}" ${item.requestActive ? "" : "disabled"}>
                入力内容を送る
              </button>
            `;
          }

          if (currentUser.role === "parent" || currentUser.role === "admin") {
            actionHtml += `
              <div class="button-row row-gap">
                <button class="button small" data-request-id="${item.id}" ${item.requestActive ? "disabled" : ""}>
                  ${item.requestActive ? "要請中" : "要請する"}
                </button>
                <button class="button ghost small" data-delete-id="${item.id}">削除</button>
              </div>
            `;
          }
        }

        return `
          <div class="${className}">
            <h4>${escapeHtml(item.name || "無題")}</h4>
            <div class="item-meta">
              種類：${ITEM_TYPE_LABELS[item.type] || item.type || "-"}<br>
              保護者：${escapeHtml(parentId)}<br>
              子供：${escapeHtml(childId)}
            </div>
            ${detailHtml}
            ${actionHtml}
          </div>
        `;
      }).join("");

      itemsContainer.querySelectorAll("[data-toggle-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          await updateDoc(doc(db, "managementItems", button.dataset.toggleId), {
            childResponse: button.dataset.value,
            updatedAt: serverTimestamp()
          });
        });
      });

      itemsContainer.querySelectorAll("[data-reply-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          const itemId = button.dataset.replyId;
          const textarea = document.getElementById(`reply-${itemId}`);
          const text = textarea?.value?.trim() || "";

          await updateDoc(doc(db, "managementItems", itemId), {
            childResponse: text || "（空の記述）",
            requestActive: false,
            updatedAt: serverTimestamp()
          });
        });
      });

      itemsContainer.querySelectorAll("[data-request-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          const itemId = button.dataset.requestId;
          await updateDoc(doc(db, "managementItems", itemId), {
            requestActive: true,
            updatedAt: serverTimestamp()
          });
        });
      });

      itemsContainer.querySelectorAll("[data-warning-send]").forEach((button) => {
        button.addEventListener("click", async () => {
          const itemId = button.dataset.warningSend;
          const item = currentItems.find((i) => i.id === itemId);
          if (!item) return;

          const select = document.getElementById(`warningTarget-${itemId}`);
          const target = select ? select.value : "";

          if (!target) {
            alert("警告先を選択してください。");
            return;
          }

          if (target === "all") {
            for (const partner of currentPartners) {
              await addDoc(collection(db, "warnings"), {
                parentUid: currentUser.uid,
                childUid: partner.uid,
                itemId: item.id,
                level: item.warningLevel || "red",
                message: item.message || "",
                createdAt: serverTimestamp()
              });
            }
          } else {
            await addDoc(collection(db, "warnings"), {
              parentUid: currentUser.uid,
              childUid: target,
              itemId: item.id,
              level: item.warningLevel || "red",
              message: item.message || "",
              createdAt: serverTimestamp()
            });
          }

          alert("警告を送信しました。");
        });
      });

      itemsContainer.querySelectorAll("[data-delete-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("この管理項目を削除しますか？")) return;
          await deleteDoc(doc(db, "managementItems", button.dataset.deleteId));
        });
      });
    }

    function renderChatPartnerOptions() {
      const currentValue = chatPartnerSelect.value;
      chatPartnerSelect.innerHTML = "";

      if (!Array.isArray(currentPartners) || currentPartners.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "連携ユーザーがいません";
        chatPartnerSelect.appendChild(option);
        return;
      }

      currentPartners.forEach((partner) => {
        const option = document.createElement("option");
        option.value = partner.uid;
        option.textContent = `${partner.accountId || "unknown"}（${ROLE_LABELS[partner.role] || partner.role || "-" }）`;
        chatPartnerSelect.appendChild(option);
      });

      if (currentPartners.some((partner) => partner.uid === currentValue)) {
        chatPartnerSelect.value = currentValue;
      }
    }

    function renderGroupMemberOptions() {
      if (!(currentUser?.role === "parent" || currentUser?.role === "admin")) {
        groupMemberContainer.innerHTML = `<div class="item-meta">この権限ではグループ作成できません。</div>`;
        return;
      }

      if (!Array.isArray(currentPartners) || currentPartners.length === 0) {
        groupMemberContainer.innerHTML = `<div class="item-meta">連携済みユーザーがいません。</div>`;
        return;
      }

      groupMemberContainer.innerHTML = currentPartners.map((partner) => `
        <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px; font-weight:400;">
          <input type="checkbox" class="group-member-checkbox" value="${partner.uid}" />
          <span>${escapeHtml(partner.accountId || "unknown")}（${ROLE_LABELS[partner.role] || partner.role || "-" }）</span>
        </label>
      `).join("");
    }

    function getSelectedRoomIdByKind() {
      if (currentChatKind === "direct") return chatPartnerSelect.dataset.roomId || "";
      if (currentChatKind === "group") return groupRoomSelect.value || "";
      if (currentChatKind === "memo") {
        const memoRoom = currentRooms.find((room) => room.type === "memo");
        return memoRoom ? memoRoom.id : "";
      }
      return "";
    }

    function setSelectedRoomIdForDirect(roomId) {
      chatPartnerSelect.dataset.roomId = roomId || "";
    }

    async function ensureDirectRoom(partnerUid) {
      if (!partnerUid) return "";

      const existing = currentRooms.find((room) =>
        room.type === "direct" &&
        Array.isArray(room.members) &&
        room.members.length === 2 &&
        room.members.includes(currentUser.uid) &&
        room.members.includes(partnerUid)
      );

      if (existing) return existing.id;

      const roomRef = await addDoc(collection(db, "chatRooms"), {
        type: "direct",
        name: "",
        members: [currentUser.uid, partnerUid],
        createdBy: currentUser.uid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      return roomRef.id;
    }

    async function ensureMemoRoom() {
      const existing = currentRooms.find((room) =>
        room.type === "memo" &&
        Array.isArray(room.members) &&
        room.members.length === 1 &&
        room.members[0] === currentUser.uid
      );

      if (existing) return existing.id;

      const roomRef = await addDoc(collection(db, "chatRooms"), {
        type: "memo",
        name: "マイメモ",
        members: [currentUser.uid],
        createdBy: currentUser.uid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      return roomRef.id;
    }

    function stopChatMessageSubscription() {
      if (typeof chatMessagesUnsubscribe === "function") chatMessagesUnsubscribe();
      chatMessagesUnsubscribe = null;
      currentRoomMessages = [];
    }

    async function subscribeChatMessages(roomId) {
      stopChatMessageSubscription();

      if (!roomId) {
        renderChatMessages();
        return;
      }

      const q = query(collection(db, "chatMessages"), where("roomId", "==", roomId));
      chatMessagesUnsubscribe = onSnapshot(q, async (snapshot) => {
        const list = snapshot.docs
          .map((docSnap) => {
            const d = docSnap.data() || {};
            return {
              id: docSnap.id,
              roomId: d.roomId || "",
              fromUid: d.fromUid || "",
              text: d.text || "",
              createdAt: d.createdAt || null,
              updatedAt: d.updatedAt || null
            };
          })
          .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

        for (const msg of list) {
          if (msg.fromUid && !usersCache.has(msg.fromUid)) {
            const user = await getUserByUid(msg.fromUid);
            if (user) usersCache.set(msg.fromUid, user);
          }
        }

        currentRoomMessages = list;
        renderChatMessages();
      });
    }

    function renderChatMessages() {
      const roomId = getSelectedRoomIdByKind();

      if (!roomId) {
        chatMessages.innerHTML = `<div class="empty">チャットルームを選択してください。</div>`;
        return;
      }

      if (!Array.isArray(currentRoomMessages) || currentRoomMessages.length === 0) {
        chatMessages.innerHTML = `<div class="empty">まだメッセージはありません。</div>`;
        return;
      }

      chatMessages.innerHTML = currentRoomMessages.map((chat) => {
        const mine = chat.fromUid === currentUser.uid;
        return `
          <div class="chat-bubble ${mine ? "me" : "other"}">
            <div class="chat-name">${escapeHtml(usersCache.get(chat.fromUid)?.accountId || "unknown")}</div>
            ${nl2br(escapeHtml(chat.text || ""))}
            ${mine ? `
              <div class="button-row" style="margin-top:8px;">
                <button class="button sub small" data-chat-edit="${chat.id}">編集</button>
                <button class="button sub small" data-chat-delete="${chat.id}">削除</button>
              </div>
            ` : ""}
          </div>
        `;
      }).join("");

      chatMessages.querySelectorAll("[data-chat-edit]").forEach((button) => {
        button.addEventListener("click", async () => {
          const target = currentRoomMessages.find((msg) => msg.id === button.dataset.chatEdit);
          if (!target) return;

          const nextText = prompt("メッセージを編集", target.text);
          if (nextText === null) return;

          await updateDoc(doc(db, "chatMessages", target.id), {
            text: nextText.trim() || "（空メッセージ）",
            updatedAt: serverTimestamp()
          });
        });
      });

      chatMessages.querySelectorAll("[data-chat-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          await deleteDoc(doc(db, "chatMessages", button.dataset.chatDelete));
        });
      });

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function renderGroupRoomSelect() {
      const currentValue = groupRoomSelect.value;
      const groupRooms = currentRooms.filter((room) => room.type === "group");
      groupRoomSelect.innerHTML = "";

      if (groupRooms.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "グループがありません";
        groupRoomSelect.appendChild(option);
        return;
      }

      groupRooms.forEach((room) => {
        const option = document.createElement("option");
        option.value = room.id;
        option.textContent = `${room.name || "グループ"}（${Array.isArray(room.members) ? room.members.length : 0}人）`;
        groupRoomSelect.appendChild(option);
      });

      if (groupRooms.some((room) => room.id === currentValue)) {
        groupRoomSelect.value = currentValue;
      }
    }

    async function subscribeRooms() {
      if (typeof chatRoomsUnsubscribe === "function") chatRoomsUnsubscribe();
      if (!currentUser) return;

      const q = query(collection(db, "chatRooms"), where("members", "array-contains", currentUser.uid));

      chatRoomsUnsubscribe = onSnapshot(q, async (snapshot) => {
        const rooms = snapshot.docs.map((docSnap) => {
          const d = docSnap.data() || {};
          return {
            id: docSnap.id,
            type: d.type || "direct",
            name: d.name || "",
            members: Array.isArray(d.members) ? d.members : [],
            createdBy: d.createdBy || "",
            createdAt: d.createdAt || null,
            updatedAt: d.updatedAt || null
          };
        });

        for (const room of rooms) {
          for (const uid of room.members) {
            if (uid && !usersCache.has(uid)) {
              const user = await getUserByUid(uid);
              if (user) usersCache.set(uid, user);
            }
          }
        }

        currentRooms = rooms;
        renderGroupRoomSelect();

        if (currentChatKind === "memo") {
          const memoRoomId = await ensureMemoRoom();
          await subscribeChatMessages(memoRoomId);
          return;
        }

        if (currentChatKind === "direct") {
          const partnerUid = chatPartnerSelect.value;
          if (partnerUid) {
            const roomId = await ensureDirectRoom(partnerUid);
            setSelectedRoomIdForDirect(roomId);
            await subscribeChatMessages(roomId);
          } else {
            stopChatMessageSubscription();
            renderChatMessages();
          }
          return;
        }

        if (currentChatKind === "group") {
          const roomId = groupRoomSelect.value || "";
          if (roomId) {
            await subscribeChatMessages(roomId);
          } else {
            stopChatMessageSubscription();
            renderChatMessages();
          }
        }
      });
    }

    async function setChatKind(kind) {
      currentChatKind = kind;

      document.querySelectorAll(".chat-tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.chatKind === kind);
      });

      document.getElementById("chatDirectControls").classList.toggle("hidden", kind !== "direct");
      document.getElementById("chatGroupControls").classList.toggle("hidden", kind !== "group");
      document.getElementById("chatMemoControls").classList.toggle("hidden", kind !== "memo");

      if (kind === "memo") {
        const roomId = await ensureMemoRoom();
        await subscribeChatMessages(roomId);
        return;
      }

      if (kind === "direct") {
        const partnerUid = chatPartnerSelect.value;
        if (!partnerUid) {
          stopChatMessageSubscription();
          renderChatMessages();
          return;
        }
        const roomId = await ensureDirectRoom(partnerUid);
        setSelectedRoomIdForDirect(roomId);
        await subscribeChatMessages(roomId);
        return;
      }

      if (kind === "group") {
        const roomId = groupRoomSelect.value || "";
        if (!roomId) {
          stopChatMessageSubscription();
          renderChatMessages();
          return;
        }
        await subscribeChatMessages(roomId);
      }
    }

    function subscribeAdminData() {
      onSnapshot(collection(db, "users"), (snapshot) => {
        adminUsers = snapshot.docs.map((docSnap) => {
          const d = docSnap.data() || {};
          return {
            uid: d.uid || docSnap.id,
            accountId: d.accountId || "unknown",
            role: d.role || "child",
            avatarEmoji: d.avatarEmoji || ""
          };
        });
        renderAdminPanel();
      });

      onSnapshot(collection(db, "links"), (snapshot) => {
        adminLinks = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...(docSnap.data() || {}) }));
        renderAdminPanel();
      });

      onSnapshot(collection(db, "managementItems"), (snapshot) => {
        adminItems = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...(docSnap.data() || {}) }));
        renderAdminPanel();
      });

      onSnapshot(collection(db, "chatRooms"), (snapshot) => {
        adminRooms = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...(docSnap.data() || {}) }));
        renderAdminPanel();
      });

      onSnapshot(collection(db, "chatMessages"), (snapshot) => {
        adminMessages = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...(docSnap.data() || {}) }));
        renderAdminPanel();
      });
    }

      if (!currentUser || currentUser.role !== "admin") return;

      const parents = adminUsers.filter((a) => a.role === "parent").length;
      const children = adminUsers.filter((a) => a.role === "child").length;
      const admins = adminUsers.filter((a) => a.role === "admin").length;

      document.getElementById("adminOverview").innerHTML = `
        <p><strong>全アカウント数：</strong>${adminUsers.length}</p>
        <p><strong>保護者アカウント数：</strong>${parents}</p>
        <p><strong>子供アカウント数：</strong>${children}</p>
        <p><strong>管理者アカウント数：</strong>${admins}</p>
        <p><strong>連携数：</strong>${adminLinks.length}</p>
        <p><strong>管理項目数：</strong>${adminItems.length}</p>
        <p><strong>チャットルーム数：</strong>${adminRooms.length}</p>
        <p><strong>チャットメッセージ数：</strong>${adminMessages.length}</p>
      `;

      renderAdminAccounts();
      renderAdminItems();

    function renderAdminAccounts() {
      const container = document.getElementById("adminAccountsContainer");

      if (adminUsers.length === 0) {
        container.innerHTML = `<div class="empty">アカウントはまだありません。</div>`;
        return;
      }

      container.innerHTML = adminUsers.map((user) => {
        const linkedCount = adminLinks.filter((link) =>
          link.parentUid === user.uid || link.childUid === user.uid
        ).length;

        return `
          <div class="item-card">
            <h4>${escapeHtml(user.accountId || "unknown")}</h4>
            <div class="item-meta">
              権限：${ROLE_LABELS[user.role] || user.role || "-"}<br>
              連携数：${linkedCount}
            </div>
            <div class="button-row">
              <button class="button sub small" data-admin-role-toggle="${user.uid}">権限変更</button>
              <button class="button sub small" data-admin-account-delete="${user.uid}">削除</button>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll("[data-admin-role-toggle]").forEach((button) => {
        button.addEventListener("click", async () => {
          const target = adminUsers.find((u) => u.uid === button.dataset.adminRoleToggle);
          if (!target) return;

          let nextRole = "parent";
          if (target.role === "parent") nextRole = "child";
          else if (target.role === "child") nextRole = "parent";
          else if (target.role === "admin") nextRole = "parent";

          await updateDoc(doc(db, "users", target.uid), {
            role: nextRole,
            updatedAt: serverTimestamp()
          });
        });
      });

      container.querySelectorAll("[data-admin-account-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("このアカウントを削除しますか？")) return;
          await deleteDoc(doc(db, "users", button.dataset.adminAccountDelete));
        });
      });

    function renderAdminItems() {
      const container = document.getElementById("adminItemsContainer");

      if (adminItems.length === 0) {
        container.innerHTML = `<div class="empty">管理項目はまだありません。</div>`;
        return;
      }

      container.innerHTML = adminItems.map((item) => {
        const parent = adminUsers.find((u) => u.uid === item.parentUid);
        const child = adminUsers.find((u) => u.uid === item.childUid);

        let className = "item-card";
        let details = "";

        if (item.type === "warning") {
          className += item.warningLevel === "red" ? " warning-red" : " warning-yellow";
          details = `
            警告レベル：${item.warningLevel === "red" ? "赤" : "黄"}<br>
            警告文：${nl2br(escapeHtml(item.message || ""))}
          `;
        } else if (item.type === "toggle") {
          const label = (item.childResponse || item.defaultValue || "OFF") === "ON"
            ? (item.onLabel || "ON")
            : (item.offLabel || "OFF");

          details = `
            説明：${nl2br(escapeHtml(item.message || ""))}<br>
            状態：${escapeHtml(label)}<br>
            ON表示：${escapeHtml(item.onLabel || "ON")} / OFF表示：${escapeHtml(item.offLabel || "OFF")}
          `;
        } else {
          details = `
            記述依頼：${nl2br(escapeHtml(item.requestText || ""))}<br>
            子供の記述：${item.childResponse ? nl2br(escapeHtml(item.childResponse)) : "未入力"}
          `;
        }

        return `
          <div class="${className}">
            <h4>${escapeHtml(item.name || "無題")}</h4>
            <div class="item-meta">
              種類：${ITEM_TYPE_LABELS[item.type] || item.type || "-"}<br>
              保護者：${escapeHtml(parent?.accountId || "-")}<br>
              子供：${escapeHtml(child?.accountId || "-")}
            </div>

            <div class="button-row">
              <button class="button sub small" data-admin-item-delete="${item.id}">削除</button>
            </div>
          </div>
        `;

      container.querySelectorAll("[data-admin-item-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("この管理項目を削除しますか？")) return;
          await deleteDoc(doc(db, "managementItems", button.dataset.adminItemDelete));
        });
      });
    }

    function renderAdminRooms() {

          await deleteDoc(doc(db, "chatRooms", button.dataset.adminRoomDelete));

    async function loadCurrentUser(uid) {
      const snap = await getDoc(doc(db, "users", uid));

      if (!snap.exists()) {
        alert("ユーザー情報が見つかりません。");
        await signOut(auth);
        location.href = "./index.html";
        return false;
      }

      const raw = snap.data() || {};
      currentUser = {
        uid: raw.uid || uid,
        accountId: raw.accountId || "unknown",
        role: raw.role || "child",
        avatarEmoji: raw.avatarEmoji || ""
      };

      usersCache.set(currentUser.uid, currentUser);

      sidebarRole.textContent = ROLE_LABELS[currentUser.role] || currentUser.role || "-";
      sidebarId.textContent = currentUser.accountId || "-";
      welcomeRole.textContent = ROLE_LABELS[currentUser.role] || currentUser.role || "-";
      welcomeTitle.textContent = `${ROLE_LABELS[currentUser.role] || currentUser.role || "不明"}アカウントでログイン中`;

      renderAvatar(sidebarAvatar, currentUser);

      document.getElementById("openAddItemButton").classList.toggle(
        "hidden",
        !(currentUser.role === "parent" || currentUser.role === "admin")
      );

      document.getElementById("linkParentSection").classList.toggle(
        "hidden",
        currentUser.role !== "parent"
      );

      adminMenuButton.classList.toggle("hidden", currentUser.role !== "admin");

      accountEmojiInput.value = currentUser.avatarEmoji || "";
      renderAccountEmojiEditor();
      renderDashboard();

      await subscribePartners();
      await subscribeItems();
      await subscribeWarnings();
      await subscribeRooms();

      if (currentUser.role === "admin") {
        subscribeAdminData();
      }

      return true;
    }

    function updateItemTypeFields() {
      const type = document.getElementById("itemType").value;
      document.getElementById("warningFields").classList.toggle("hidden", type !== "warning");
      document.getElementById("toggleFields").classList.toggle("hidden", type !== "toggle");
      document.getElementById("textFields").classList.toggle("hidden", type !== "text");
    }

    async function addManagementItems() {
      const name = document.getElementById("itemName").value.trim();
      const type = document.getElementById("itemType").value;
      const warningMessage = document.getElementById("warningMessage").value.trim();
      const warningLevel = document.getElementById("warningLevel").value;
      const toggleMessage = document.getElementById("toggleMessage").value.trim();
      const toggleDefault = document.getElementById("toggleDefault").value;
      const toggleOnLabel = document.getElementById("toggleOnLabel").value.trim();
      const toggleOffLabel = document.getElementById("toggleOffLabel").value.trim();
      const textRequest = document.getElementById("textRequest").value.trim();

      if (!name) return alert("管理項目名を入力してください。");
      if (!Array.isArray(currentPartners) || currentPartners.length === 0) return alert("先に対象ユーザーを用意してください。");
      if (type === "warning" && !warningMessage) return alert("警告文を入力してください。");
      if (type === "toggle" && !toggleMessage) return alert("ON/OFF項目の説明を入力してください。");
      if (type === "toggle" && !toggleOnLabel) return alert("ON時の表示を入力してください。");
      if (type === "toggle" && !toggleOffLabel) return alert("OFF時の表示を入力してください。");
      if (type === "text" && !textRequest) return alert("子供への記述依頼を入力してください。");

      for (const partner of currentPartners) {
        await addDoc(collection(db, "managementItems"), {
          parentUid: currentUser.uid,
          childUid: partner.uid,
          name,
          type,
          message: type === "warning" ? warningMessage : type === "toggle" ? toggleMessage : "",
          warningLevel: type === "warning" ? warningLevel : "",
          defaultValue: type === "toggle" ? toggleDefault : "",
          onLabel: type === "toggle" ? toggleOnLabel : "",
          offLabel: type === "toggle" ? toggleOffLabel : "",
          requestText: type === "text" ? textRequest : "",
          childResponse: type === "toggle" ? toggleDefault : "",
          requestActive: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }

      document.getElementById("itemName").value = "";
      document.getElementById("itemType").value = "warning";
      document.getElementById("warningMessage").value = "";
      document.getElementById("warningLevel").value = "red";
      document.getElementById("toggleMessage").value = "";
      document.getElementById("toggleDefault").value = "OFF";
      document.getElementById("toggleOnLabel").value = "";
      document.getElementById("toggleOffLabel").value = "";
      document.getElementById("textRequest").value = "";
      updateItemTypeFields();
      document.getElementById("addItemSection").classList.add("hidden");
    }

    async function linkChild() {
      const childAccountId = (document.getElementById("linkChildId").value || "").trim().toLowerCase();
      if (!childAccountId) return alert("子供のアカウントIDを入力してください。");

      const childQuery = query(collection(db, "users"), where("accountId", "==", childAccountId));
      const snapshot = await getDocs(childQuery);

      if (snapshot.empty) return alert("子供用アカウントが見つかりません。");

      const raw = snapshot.docs[0].data() || {};
      const child = {
        uid: raw.uid || snapshot.docs[0].id,
        accountId: raw.accountId || "unknown",
        role: raw.role || "child"
      };

      if (child.role !== "child") return alert("子供用アカウントが見つかりません。");

      const existsQuery = query(
        collection(db, "links"),
        where("parentUid", "==", currentUser.uid),
        where("childUid", "==", child.uid)
      );
      const existsSnapshot = await getDocs(existsQuery);

      if (!existsSnapshot.empty) return alert("すでに連携済みです。");

      await addDoc(collection(db, "links"), {
        parentUid: currentUser.uid,
        childUid: child.uid,
        createdAt: serverTimestamp()
      });

      document.getElementById("linkChildId").value = "";
    }

      if (currentChatKind === "group" && !roomId) {
        alert("グループを選んでください。");
        return;
      }

      await addDoc(collection(db, "chatMessages"), {
        roomId,
        fromUid: currentUser.uid,

        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      const newPassword = document.getElementById("newPassword").value;

      if (!newPassword || newPassword.length < 6) {

        return;

      } catch (error) {
        console.error(error);
        alert("画面の初期化中にエラーが発生しました。コンソールを確認してください。");
      }
    });
  </script>
