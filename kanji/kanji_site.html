<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漢字しらべ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
      color: #1f2937;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: rgba(255,255,255,0.94);
      border: 1px solid #dbe4ee;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(24, 39, 75, 0.08);
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
    }
    .hero p {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }
    .search-box {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      min-width: 240px;
      border: 1px solid #cfd8e3;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 16px;
      background: #fff;
    }
    .search-box button {
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 700;
      background: #2563eb;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.24);
    }
    .search-box button:hover { opacity: 0.95; }
    .hint {
      margin-top: 12px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid #dbe4ee;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 36px rgba(24, 39, 75, 0.06);
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }
    .kanji-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .kanji-chip {
      border: 1px solid #d5deea;
      background: #fff;
      border-radius: 16px;
      padding: 14px 0;
      text-align: center;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .kanji-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .result-count {
      color: #6b7280;
      font-size: 14px;
    }
    .candidate-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .candidate-btn {
      border: 1px solid #cfe0ff;
      background: #f7faff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .candidate-btn:hover {
      background: #eef4ff;
    }
    .detail-list {
      display: grid;
      gap: 18px;
    }
    .detail-item {
      border: 1px solid #dbe4ee;
      border-radius: 24px;
      padding: 20px;
      background: #fbfdff;
    }
    .detail-top {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .big-kanji {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      background: #f8fbff;
      border: 1px solid #d7e3f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .reading {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 700;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 16px;
    }
    .info-box {
      border: 1px solid #dbe4ee;
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }
    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .value {
      font-size: 18px;
      font-weight: 700;
    }
    .meaning {
      margin-top: 20px;
      line-height: 1.8;
      color: #374151;
    }
    .empty {
      color: #6b7280;
      line-height: 1.8;
    }
    .notice {
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #92400e;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    code.inline {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .kanji-grid { grid-template-columns: repeat(3, 1fr); }
      .big-kanji { width: 96px; height: 96px; font-size: 56px; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>漢字しらべ</h1>
      <p>最大15文字までまとめて調べられます。ひらがなを入力した場合は、同じ読みの候補を一覧表示して選べます。</p>
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="例：森空海山川花鳥風月 / あい / かい" maxlength="30" />
        <button id="searchButton">検索</button>
      </div>
      <div class="hint">
        漢字入力：最大15文字まで同時表示<br />
        ひらがな入力：同じ読みの候補を一覧表示<br />
        未登録漢字：拡大表示し、詳細はすべて「不明」<br />
        データ本体：<code class="inline">kanji.json</code>
      </div>
    </section>

    <div class="layout">
      <aside class="card">
        <h2 class="section-title">サンプル表示</h2>
        <div class="kanji-grid" id="kanjiGrid"></div>
      </aside>

      <main class="card" id="detailCard">
        <div class="notice">
          漢字データは <strong>kanji.json</strong> から読み込みます。未登録の漢字でも結果カードは表示されます。
        </div>
        <div class="empty">左の漢字、または上の検索欄から入力すると詳細が表示されます。</div>
      </main>
    </div>
  </div>

  <script>
    let kanjiData = {};
    let readingIndex = {};

    const kanjiGrid = document.getElementById("kanjiGrid");
    const detailCard = document.getElementById("detailCard");
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");

    function normalizeReading(text) {
      return (text || "")
        .trim()
        .replace(/\./g, "")
        .replace(/\s+/g, "")
        .replace(/[ァ-ヶ]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0x60));
    }

    function isHiraganaOnly(text) {
      return /^[ぁ-ゖー\s]+$/.test(text);
    }

    function buildReadingIndex() {
      const index = {};
      Object.values(kanjiData).forEach((item) => {
        const readings = [
          ...(item.onyomi || []),
          ...(item.kunyomi || []),
          ...(item.searchReadings || [])
        ];

        readings.forEach((reading) => {
          const normalized = normalizeReading(reading);
          if (!normalized) return;
          if (!index[normalized]) index[normalized] = [];
          if (!index[normalized].includes(item.kanji)) {
            index[normalized].push(item.kanji);
          }
        });
      });
      readingIndex = index;
    }

    function renderGrid() {
      kanjiGrid.innerHTML = "";
      Object.keys(kanjiData).slice(0, 12).forEach((kanji) => {
        const button = document.createElement("button");
        button.className = "kanji-chip";
        button.textContent = kanji;
        button.addEventListener("click", () => renderMultiKanjiDetails([kanji]));
        kanjiGrid.appendChild(button);
      });
    }

    function createUnknownItem(kanji) {
      return {
        kanji,
        onyomi: [],
        kunyomi: [],
        bushu: "不明",
        kakusu: "不明",
        grade: "不明",
        kanken: "不明",
        meaning: "不明",
        isUnknown: true
      };
    }

    function renderMultiKanjiDetails(kanjiList) {
      const safeList = kanjiList.slice(0, 15);
      const items = safeList.map((kanji) => kanjiData[kanji] || createUnknownItem(kanji));

      if (items.length === 0) {
        detailCard.innerHTML = `<div class="empty">該当する漢字データが見つかりませんでした。</div>`;
        return;
      }

      detailCard.innerHTML = `
        <div class="result-header">
          <h2 class="section-title" style="margin:0;">検索結果</h2>
          <div class="result-count">${items.length}文字を表示中（最大15文字）</div>
        </div>
        <div class="detail-list">
          ${items.map((item) => `
            <section class="detail-item">
              <div class="detail-top">
                <div class="big-kanji">${item.kanji}</div>
                <div>
                  <div style="font-size: 28px; font-weight: 800;">${item.kanji}</div>
                  <div class="reading">
                    <span class="pill">音読み：${item.isUnknown ? "不明" : ((item.onyomi || []).join("、") || "-" )}</span>
                    <span class="pill">訓読み：${item.isUnknown ? "不明" : ((item.kunyomi || []).join("、") || "-" )}</span>
                  </div>
                </div>
              </div>
              <div class="info-grid">
                <div class="info-box"><div class="label">部首</div><div class="value">${item.bushu || "不明"}</div></div>
                <div class="info-box"><div class="label">画数</div><div class="value">${typeof item.kakusu === "number" ? `${item.kakusu}画` : "不明"}</div></div>
                <div class="info-box"><div class="label">学年目安</div><div class="value">${item.grade || "不明"}</div></div>
                <div class="info-box"><div class="label">漢検目安</div><div class="value">${item.kanken || "不明"}</div></div>
              </div>
              <div class="meaning"><strong>意味</strong><br />${item.meaning || "不明"}</div>
            </section>
          `).join("")}
        </div>
      `;
    }

    function renderReadingCandidates(input) {
      const normalized = normalizeReading(input);
      const candidates = (readingIndex[normalized] || []).slice(0, 200);

      if (candidates.length === 0) {
        detailCard.innerHTML = `<div class="empty">「${input}」に対応する候補が見つかりませんでした。</div>`;
        return;
      }

      detailCard.innerHTML = `
        <div class="result-header">
          <h2 class="section-title" style="margin:0;">読み候補</h2>
          <div class="result-count">「${input}」に一致する候補 ${candidates.length}件</div>
        </div>
        <div class="candidate-list" id="candidateList"></div>
        <div class="empty">候補を選ぶと詳細を表示します。</div>
      `;

      const candidateList = document.getElementById("candidateList");
      candidates.forEach((kanji) => {
        const btn = document.createElement("button");
        btn.className = "candidate-btn";
        btn.textContent = kanji;
        btn.addEventListener("click", () => renderMultiKanjiDetails([kanji]));
        candidateList.appendChild(btn);
      });
    }

    function handleSearch() {
      const value = searchInput.value.trim();
      if (!value) return;

      if (isHiraganaOnly(value)) {
        renderReadingCandidates(value);
        return;
      }

      const chars = [...value].filter((char) => char.trim()).slice(0, 15);
      renderMultiKanjiDetails(chars);
    }

    async function loadKanjiData() {
      try {
        const response = await fetch("./kanji.json");
        if (!response.ok) throw new Error("kanji.json の読み込みに失敗しました");
        kanjiData = await response.json();
        buildReadingIndex();
        renderGrid();
      } catch (error) {
        detailCard.innerHTML = `
          <div class="notice">
            <strong>kanji.json を読み込めませんでした。</strong><br />
            HTMLと同じフォルダに <code class="inline">kanji.json</code> を置いてください。
          </div>
          <div class="empty">エラー: ${error.message}</div>
        `;
      }
    }

    searchButton.addEventListener("click", handleSearch);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSearch();
    });

    loadKanjiData();
  </script>
</body>
</html>
