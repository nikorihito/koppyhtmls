<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保護者用管理サイト - index.html</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.3;
    }

    .description {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.7;
      font-size: 15px;
    }

    .section {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      background: #ffffff;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #334155;
      box-shadow: 0 0 0 3px rgba(51, 65, 85, 0.12);
    }

    input[type="file"] {
      width: 100%;
      font-size: 14px;
      margin-top: 4px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .role-option {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s ease;
    }

    .role-option.active {
      border-color: #0f172a;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    }

    .role-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .role-text {
      color: #64748b;
      font-size: 13px;
      line-height: 1.5;
    }

    .button {
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: 14px;
      background: #0f172a;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 14px;
      padding: 12px 18px;
    }

    .button.sub {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .button:hover {
      opacity: 0.92;
    }

    .message {
      margin-top: 12px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      display: none;
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px;
      }

      h1 {
        font-size: 24px;
      }

      .role-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>保護者用管理サイト</h1>
      <p class="description">
        ホーム画面です。アカウント作成とログインができます。
      </p>

      <div class="section">
        <h2 class="section-title">ログイン</h2>
        <label for="loginId">アカウントID</label>
        <input id="loginId" type="text" placeholder="アカウントIDを入力" />
        <button class="button" id="loginButton">ログインする</button>
      </div>

      <div class="section">
        <h2 class="section-title">アカウント作成</h2>

        <label for="newAccountId">新しいアカウントID</label>
        <input id="newAccountId" type="text" placeholder="新しいアカウントIDを入力" />

        <label for="accountImage" style="margin-top:16px;">アカウント画像（任意）</label>
        <input id="accountImage" type="file" accept="image/*" />

        <label style="margin-top:16px;">権限</label>
        <div class="role-grid">
          <button type="button" class="role-option active" data-role="child">
            <div class="role-name">子供用</div>
            <div class="role-text">子供が使うアカウント</div>
          </button>
          <button type="button" class="role-option" data-role="parent">
            <div class="role-name">保護者用</div>
            <div class="role-text">保護者が使うアカウント</div>
          </button>
        </div>

        <button class="button sub" id="createButton">アカウント作成ボタン</button>
      </div>

      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <script>
    const roleLabels = {
      child: "子供用",
      parent: "保護者用"
    };

    let selectedRole = "child";
    let selectedImageData = "";

    const roleOptions = document.querySelectorAll(".role-option");
    const messageBox = document.getElementById("messageBox");

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) ?? fallback;
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getAccounts() {
      return readJson("accounts", []);
    }

    function showMessage(text) {
      if (!text) {
        messageBox.style.display = "none";
        messageBox.textContent = "";
        return;
      }
      messageBox.textContent = text;
      messageBox.style.display = "block";
    }

    roleOptions.forEach((button) => {
      button.addEventListener("click", () => {
        selectedRole = button.dataset.role;
        roleOptions.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    document.getElementById("accountImage").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) {
        selectedImageData = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        selectedImageData = reader.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("createButton").addEventListener("click", () => {
      const newId = document.getElementById("newAccountId").value.trim();

      if (!newId) {
        showMessage("アカウントIDを入力してください。");
        return;
      }

      const accounts = getAccounts();
      const exists = accounts.some((account) => account.id === newId);

      if (exists) {
        showMessage("そのアカウントIDはすでに使用されています。");
        return;
      }

      accounts.push({
        id: newId,
        role: selectedRole,
        image: selectedImageData || ""
      });

      writeJson("accounts", accounts);

      document.getElementById("newAccountId").value = "";
      document.getElementById("accountImage").value = "";
      selectedImageData = "";

      showMessage(`${roleLabels[selectedRole]}アカウントを作成しました：${newId}`);
    });

    document.getElementById("loginButton").addEventListener("click", () => {
      const loginId = document.getElementById("loginId").value.trim();

      if (!loginId) {
        showMessage("アカウントIDを入力してください。");
        return;
      }

      const accounts = getAccounts();
      const found = accounts.find((account) => account.id === loginId);

      if (!found) {
        showMessage("該当するアカウントが見つかりません。");
        return;
      }

      sessionStorage.setItem("currentUserId", found.id);
      window.location.href = "main.html";
    });
  </script>
</body>
</html>
