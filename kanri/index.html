<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まもきっず - ログイン</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.3;
    }

    .description {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.7;
      font-size: 15px;
    }

    .section {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      background: #fff;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus,
    select:focus {
      border-color: #334155;
      box-shadow: 0 0 0 3px rgba(51, 65, 85, 0.12);
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
    }

    .role-option {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      text-align: left;
    }

    .role-option.active {
      border-color: #0f172a;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    }

    .role-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .role-text {
      color: #64748b;
      font-size: 13px;
      line-height: 1.5;
    }

    .button {
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: 14px;
      background: #0f172a;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      padding: 12px 18px;
    }

    .button.sub {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .message {
      margin-top: 12px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      display: none;
      white-space: pre-wrap;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px;
      }

      h1 {
        font-size: 24px;
      }

      .role-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" id="appCard">
      <h1>まもきっず</h1>
      <p class="description">
        保護者・子供のアカウント作成とログインができます。
      </p>

      <div class="section">
        <h2 class="section-title">ログイン</h2>

        <label for="loginAccountId">アカウントID</label>
        <input id="loginAccountId" type="text" placeholder="アカウントIDを入力" />

        <label for="loginPassword">パスワード</label>
        <input id="loginPassword" type="password" placeholder="パスワードを入力" />

        <button class="button" id="loginButton">ログインする</button>
      </div>

      <div class="section">
        <h2 class="section-title">アカウント作成</h2>

        <label for="newAccountId">新しいアカウントID</label>
        <input id="newAccountId" type="text" placeholder="新しいアカウントIDを入力" />

        <label for="newPassword">パスワード</label>
        <input id="newPassword" type="password" placeholder="6文字以上のパスワード" />

        <label for="avatarEmoji">アカウント絵文字（任意）</label>
        <select id="avatarEmoji">
          <option value="">選択しない</option>
          <option value="😀">😀</option>
          <option value="😺">😺</option>
          <option value="🐱">🐱</option>
          <option value="🐶">🐶</option>
          <option value="🐰">🐰</option>
          <option value="🦊">🦊</option>
          <option value="🐼">🐼</option>
          <option value="🧒">🧒</option>
          <option value="👦">👦</option>
          <option value="👧">👧</option>
          <option value="👩">👩</option>
          <option value="👨">👨</option>
          <option value="👪">👪</option>
          <option value="🌟">🌟</option>
          <option value="🎮">🎮</option>
          <option value="📚">📚</option>
          <option value="📝">📝</option>
          <option value="🚀">🚀</option>
          <option value="🍀">🍀</option>
          <option value="🔧">🔧</option>
        </select>

        <label style="margin-top:16px;">権限</label>
        <div class="role-grid">
          <button type="button" class="role-option active" data-role="child">
            <div class="role-name">子供用</div>
            <div class="role-text">子供が使うアカウント</div>
          </button>
          <button type="button" class="role-option" data-role="parent">
            <div class="role-name">保護者用</div>
            <div class="role-text">保護者が使うアカウント</div>
          </button>
        </div>

        <button class="button sub" id="createButton">アカウント作成</button>
      </div>

      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <script type="module">
    import {
      auth,
      db,
      serverTimestamp,
      normalizeAccountId,
      accountIdToEmail
    } from "./firebase-config.js";

    import {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    import {
      doc,
      setDoc,
      getDoc,
      getDocs,
      query,
      where,
      collection
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const messageBox = document.getElementById("messageBox");
    const appCard = document.getElementById("appCard");
    const roleOptions = document.querySelectorAll(".role-option");

    let selectedRole = "child";

    function showMessage(text) {
      messageBox.textContent = text;
      messageBox.style.display = text ? "block" : "none";
    }

    function setLoading(isLoading) {
      appCard.classList.toggle("loading", isLoading);
    }

    roleOptions.forEach((button) => {
      button.addEventListener("click", () => {
        selectedRole = button.dataset.role;
        roleOptions.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    async function accountIdExists(accountId) {
      const q = query(collection(db, "users"), where("accountId", "==", accountId));
      const snapshot = await getDocs(q);
      return !snapshot.empty;
    }

    document.getElementById("createButton").addEventListener("click", async () => {
      const accountId = normalizeAccountId(document.getElementById("newAccountId").value);
      const password = document.getElementById("newPassword").value;
      const avatarEmoji = document.getElementById("avatarEmoji").value;

      try {
        showMessage("");

        if (!accountId) throw new Error("アカウントIDを入力してください。");
        if (accountId.length < 3) throw new Error("アカウントIDは3文字以上にしてください。");
        if (!password || password.length < 6) throw new Error("パスワードは6文字以上にしてください。");

        setLoading(true);

        if (await accountIdExists(accountId)) {
          throw new Error("そのアカウントIDはすでに使われています。");
        }

        const email = accountIdToEmail(accountId);
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = credential.user.uid;

        await setDoc(doc(db, "users", uid), {
          uid,
          accountId,
          role: selectedRole,
          avatarEmoji: avatarEmoji || "",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        showMessage("アカウントを作成しました。ログインできます。");
        document.getElementById("newAccountId").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("avatarEmoji").value = "";
      } catch (error) {
        showMessage(error.message || "アカウント作成に失敗しました。");
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("loginButton").addEventListener("click", async () => {
      const accountId = normalizeAccountId(document.getElementById("loginAccountId").value);
      const password = document.getElementById("loginPassword").value;

      try {
        showMessage("");

        if (!accountId) throw new Error("アカウントIDを入力してください。");
        if (!password) throw new Error("パスワードを入力してください。");

        setLoading(true);

        const email = accountIdToEmail(accountId);
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showMessage("ログインに失敗しました。アカウントIDまたはパスワードを確認してください。");
      } finally {
        setLoading(false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) return;

      if (!location.pathname.endsWith("/main.html")) {
        location.href = "./main.html";
      }
    });
  </script>
</body>
</html>
