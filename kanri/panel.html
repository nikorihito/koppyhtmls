<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まもきっず - panel</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .hidden { display: none !important; }
    .page { min-height: 100vh; padding: 24px; }
    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 48px);
      gap: 20px;
    }
    .sidebar, .main-panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }
    .profile-box {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: #f8fafc;
      border-radius: 18px;
      margin-bottom: 18px;
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .menu-button {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .menu-button.active { background: #e2e8f0; }
    .nav-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .alert {
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .button {
      min-height: 48px;
      border: none;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 18px;
    }
    .button.sub {
      background: #fff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .button.small {
      min-height: 40px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 12px;
    }
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .item-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .item-card h4 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .item-meta {
      color: #64748b;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .empty {
      padding: 18px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: #64748b;
      line-height: 1.7;
    }
    .warning-red {
      border-left: 6px solid #dc2626;
      background: #fef2f2;
    }
    .warning-yellow {
      border-left: 6px solid #ca8a04;
      background: #fefce8;
    }
    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .page { padding: 14px; }
      .sidebar, .main-panel { padding: 20px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="profile-box">
          <div>
            <div class="badge">管理者</div>
            <div style="font-weight:700; font-size:18px;">panel.html</div>
          </div>
        </div>

        <div class="nav-title">管理メニュー</div>
        <button class="menu-button active" data-panel="overview">概要</button>
        <button class="menu-button" data-panel="accounts">アカウント管理</button>
        <button class="menu-button" data-panel="items">管理項目の管理</button>
        <button class="menu-button" data-panel="chats">全ユーザーの会話管理</button>
        <button class="menu-button" id="goMainButton">main.htmlへ</button>
        <button class="menu-button" id="logoutButton">ログアウトする</button>
      </aside>

      <main class="main-panel">
        <section id="panel-overview">
          <div class="panel-title">
            <div>
              <div class="badge">概要</div>
              <h2>管理者パネル</h2>
            </div>
          </div>
          <div class="section" id="overviewSummary"></div>
        </section>

        <section id="panel-accounts" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">アカウント管理</div>
              <h2>全アカウント一覧</h2>
            </div>
          </div>
          <div class="alert">アカウントの削除と権限変更ができます。</div>
          <div id="accountsContainer"></div>
        </section>

        <section id="panel-items" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">管理項目の管理</div>
              <h2>全管理項目一覧</h2>
            </div>
          </div>
          <div class="alert">全ユーザーの管理項目を一覧表示し、編集・削除できます。</div>
          <div id="itemsContainer"></div>
        </section>

        <section id="panel-chats" class="hidden">
          <div class="panel-title">
            <div>
              <div class="badge">全ユーザーの会話管理</div>
              <h2>全チャット一覧</h2>
            </div>
          </div>
          <div class="alert">全ユーザーの会話内容を確認し、編集・削除できます。</div>
          <div id="chatsContainer"></div>
        </section>
      </main>
    </div>
  </div>

  <script type="module">
    import {
      auth,
      db,
      serverTimestamp,
      ROLE_LABELS,
      ITEM_TYPE_LABELS,
      nl2br,
      escapeHtml
    } from "./firebase-config.js";

    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    import {
      doc,
      getDoc,
      updateDoc,
      deleteDoc,
      collection,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    let currentPanel = "overview";
    let currentUser = null;
    let users = [];
    let links = [];
    let items = [];
    let chats = [];

    function setActivePanel(panelName) {
      currentPanel = panelName;
      document.querySelectorAll(".menu-button[data-panel]").forEach((button) => {
        button.classList.toggle("active", button.dataset.panel === panelName);
      });
      document.getElementById("panel-overview").classList.toggle("hidden", panelName !== "overview");
      document.getElementById("panel-accounts").classList.toggle("hidden", panelName !== "accounts");
      document.getElementById("panel-items").classList.toggle("hidden", panelName !== "items");
      document.getElementById("panel-chats").classList.toggle("hidden", panelName !== "chats");
    }

    function getUserByUid(uid) {
      return users.find((user) => user.uid === uid);
    }

    function renderOverview() {
      const parents = users.filter((a) => a.role === "parent").length;
      const children = users.filter((a) => a.role === "child").length;
      const admins = users.filter((a) => a.role === "admin").length;

      document.getElementById("overviewSummary").innerHTML = `
        <div class="badge">集計</div>
        <p><strong>全アカウント数：</strong>${users.length}</p>
        <p><strong>保護者アカウント数：</strong>${parents}</p>
        <p><strong>子供アカウント数：</strong>${children}</p>
        <p><strong>管理者アカウント数：</strong>${admins}</p>
        <p><strong>連携数：</strong>${links.length}</p>
        <p><strong>管理項目数：</strong>${items.length}</p>
        <p style="margin-bottom:0;"><strong>会話メッセージ数：</strong>${chats.length}</p>
      `;
    }

    function renderAccounts() {
      const container = document.getElementById("accountsContainer");

      if (users.length === 0) {
        container.innerHTML = `<div class="empty">アカウントはまだありません。</div>`;
        return;
      }

      container.innerHTML = users.map((user) => {
        const linkedCount = links.filter((link) => link.parentUid === user.uid || link.childUid === user.uid).length;
        return `
          <div class="item-card">
            <h4>${escapeHtml(user.accountId)}</h4>
            <div class="item-meta">
              権限：${ROLE_LABELS[user.role] || user.role}<br>
              連携数：${linkedCount}
            </div>
            <div class="button-row">
              <button class="button sub small" data-role-toggle="${user.uid}">権限変更</button>
              <button class="button sub small" data-account-delete="${user.uid}">削除</button>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll("[data-role-toggle]").forEach((button) => {
        button.addEventListener("click", async () => {
          const target = getUserByUid(button.dataset.roleToggle);
          if (!target) return;

          let nextRole = "parent";
          if (target.role === "parent") nextRole = "child";
          else if (target.role === "child") nextRole = "parent";
          else if (target.role === "admin") nextRole = "parent";

          await updateDoc(doc(db, "users", target.uid), {
            role: nextRole,
            updatedAt: serverTimestamp()
          });
        });
      });

      container.querySelectorAll("[data-account-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("このアカウントを削除しますか？")) return;
          await deleteDoc(doc(db, "users", button.dataset.accountDelete));
        });
      });
    }

    function renderItems() {
      const container = document.getElementById("itemsContainer");

      if (items.length === 0) {
        container.innerHTML = `<div class="empty">管理項目はまだありません。</div>`;
        return;
      }

      container.innerHTML = items.map((item) => {
        const parent = getUserByUid(item.parentUid);
        const child = getUserByUid(item.childUid);

        let className = "item-card";
        let details = "";

        if (item.type === "warning") {
          className += item.warningLevel === "red" ? " warning-red" : " warning-yellow";
          details = `
            警告レベル：${item.warningLevel === "red" ? "赤" : "黄"}<br>
            警告文：${nl2br(escapeHtml(item.message))}
          `;
        } else if (item.type === "toggle") {
          details = `
            説明：${nl2br(escapeHtml(item.message))}<br>
            状態：${escapeHtml(item.childResponse || item.defaultValue || "OFF")}
          `;
        } else {
          details = `
            記述依頼：${nl2br(escapeHtml(item.requestText))}<br>
            子供の記述：${item.childResponse ? nl2br(escapeHtml(item.childResponse)) : "未入力"}
          `;
        }

        return `
          <div class="${className}">
            <h4>${escapeHtml(item.name)}</h4>
            <div class="item-meta">
              種類：${ITEM_TYPE_LABELS[item.type]}<br>
              保護者：${escapeHtml(parent?.accountId || "-")}<br>
              子供：${escapeHtml(child?.accountId || "-")}
            </div>
            <div class="item-meta">${details}</div>
            <div class="button-row">
              <button class="button sub small" data-item-edit="${item.id}">編集</button>
              <button class="button sub small" data-item-delete="${item.id}">削除</button>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll("[data-item-edit]").forEach((button) => {
        button.addEventListener("click", async () => {
          const item = items.find((i) => i.id === button.dataset.itemEdit);
          if (!item) return;

          const nextName = prompt("管理項目名を編集", item.name);
          if (nextName !== null && nextName.trim()) {
            item.name = nextName.trim();
          }

          if (item.type === "warning") {
            const nextMessage = prompt("警告文を編集", item.message || "");
            if (nextMessage !== null) item.message = nextMessage;
            const nextLevel = prompt("警告レベルを入力（red / yellow）", item.warningLevel || "red");
            if (nextLevel === "red" || nextLevel === "yellow") item.warningLevel = nextLevel;
          }

          if (item.type === "toggle") {
            const nextMessage = prompt("オンオフ項目の説明を編集", item.message || "");
            if (nextMessage !== null) item.message = nextMessage;
            const nextState = prompt("状態を入力（ON / OFF）", item.childResponse || item.defaultValue || "OFF");
            if (nextState === "ON" || nextState === "OFF") item.childResponse = nextState;
          }

          if (item.type === "text") {
            const nextRequest = prompt("記述依頼を編集", item.requestText || "");
            if (nextRequest !== null) item.requestText = nextRequest;
            const nextResponse = prompt("子供の記述を編集", item.childResponse || "");
            if (nextResponse !== null) item.childResponse = nextResponse;
          }

          await updateDoc(doc(db, "managementItems", item.id), {
            ...item,
            updatedAt: serverTimestamp()
          });
        });
      });

      container.querySelectorAll("[data-item-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("この管理項目を削除しますか？")) return;
          await deleteDoc(doc(db, "managementItems", button.dataset.itemDelete));
        });
      });
    }

    function renderChats() {
      const container = document.getElementById("chatsContainer");

      if (chats.length === 0) {
        container.innerHTML = `<div class="empty">会話はまだありません。</div>`;
        return;
      }

      const sorted = [...chats].sort((a, b) => {
        const aTime = a.createdAt?.seconds || 0;
        const bTime = b.createdAt?.seconds || 0;
        return bTime - aTime;
      });

      container.innerHTML = sorted.map((chat) => {
        const fromUser = getUserByUid(chat.fromUid);
        const toUser = getUserByUid(chat.toUid);

        return `
          <div class="item-card">
            <h4>${escapeHtml(fromUser?.accountId || "unknown")} → ${escapeHtml(toUser?.accountId || "unknown")}</h4>
            <div class="item-meta">
              内容：${nl2br(escapeHtml(chat.text || ""))}
            </div>
            <div class="button-row">
              <button class="button sub small" data-chat-edit="${chat.id}">編集</button>
              <button class="button sub small" data-chat-delete="${chat.id}">削除</button>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll("[data-chat-edit]").forEach((button) => {
        button.addEventListener("click", async () => {
          const chat = chats.find((c) => c.id === button.dataset.chatEdit);
          if (!chat) return;

          const nextText = prompt("会話内容を編集", chat.text || "");
          if (nextText === null) return;

          await updateDoc(doc(db, "chats", chat.id), {
            text: nextText.trim() || "（空メッセージ）",
            updatedAt: serverTimestamp()
          });
        });
      });

      container.querySelectorAll("[data-chat-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!confirm("この会話を削除しますか？")) return;
          await deleteDoc(doc(db, "chats", button.dataset.chatDelete));
        });
      });
    }

    function renderAll() {
      renderOverview();
      renderAccounts();
      renderItems();
      renderChats();
      setActivePanel(currentPanel);
    }

    function subscribeAll() {
      onSnapshot(collection(db, "users"), (snapshot) => {
        users = snapshot.docs.map((docSnap) => docSnap.data());
        renderAll();
      });

      onSnapshot(collection(db, "links"), (snapshot) => {
        links = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
        renderAll();
      });

      onSnapshot(collection(db, "managementItems"), (snapshot) => {
        items = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
        renderAll();
      });

      onSnapshot(collection(db, "chats"), (snapshot) => {
        chats = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
        renderAll();
      });
    }

    document.querySelectorAll(".menu-button[data-panel]").forEach((button) => {
      button.addEventListener("click", () => setActivePanel(button.dataset.panel));
    });

    document.getElementById("goMainButton").addEventListener("click", () => {
      location.href = "./main.html";
    });

    document.getElementById("logoutButton").addEventListener("click", async () => {
      await signOut(auth);
      location.href = "./index.html";
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        location.href = "./index.html";
        return;
      }

      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) {
        location.href = "./index.html";
        return;
      }

      currentUser = snap.data();
      if (currentUser.role !== "admin") {
        location.href = "./main.html";
        return;
      }

      subscribeAll();
      setActivePanel("overview");
    });
  </script>
</body>
</html>
