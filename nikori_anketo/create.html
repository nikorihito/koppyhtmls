<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アンケート作成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <h2>アンケート作成</h2>

      <label>タイトル</label>
      <input type="text" id="surveyTitle" placeholder="アンケートタイトル" />

      <label>質問</label>
      <div id="questionList">
        <input type="text" placeholder="質問を入力" />
      </div>

      <div class="button-group">
        <button class="btn" onclick="addQuestion()">質問を追加</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
